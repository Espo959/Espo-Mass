    function uniqSorted(vals){
      const arr=[];
      vals.map(v=>Math.round(v)).sort((a,b)=>a-b).forEach(v=>{
        if(!arr.length || Math.abs(arr[arr.length-1]-v)>1) arr.push(v);
      });
      return arr;
    }

    function chainDimsForSide(side,group){
      // v129 FIX: Kettenmaße dürfen nicht aus ALLEN Polygonpunkten entstehen,
      // sonst tauchen nachträglich bei Eckausbrüchen falsche / zu viele Teilmaße auf.
      // Deshalb nur Koordinaten der Segmente verwenden, die wirklich zu dieser Maß-Seite gehören.
      const eps=2;
      if(side==="top"||side==="bottom"){
        const y=side==="top"?minY:maxY;
        const horizGroup=group.filter(g=>Math.abs(g.b.x-g.a.x)>=Math.abs(g.b.y-g.a.y));
        let vals=[minX,maxX];
        horizGroup.forEach(g=>{ vals.push(g.a.x,g.b.x); });
        const xs=uniqSorted(vals);
        return xs.slice(0,-1).map((x,i)=>{
          const nx=xs[i+1];
          const hit=horizGroup.find(g=>
            Math.abs(Math.min(g.a.x,g.b.x)-x)<eps &&
            Math.abs(Math.max(g.a.x,g.b.x)-nx)<eps
          );
          return {i:"chain"+i,a:{x,y},b:{x:nx,y},len:cleanNum(Math.abs(cadXForVisualX(nx)-cadXForVisualX(x)),2),side,pathId:hit&&hit.pathId,segIdx:hit&&hit.segIdx,isCut:hit&&hit.isCut};
        }).filter(d=>d.len>1);
      } else {
        const x=side==="left"?minX:maxX;
        const vertGroup=group.filter(g=>Math.abs(g.b.y-g.a.y)>Math.abs(g.b.x-g.a.x));
        let vals=[minY,maxY];
        vertGroup.forEach(g=>{ vals.push(g.a.y,g.b.y); });
        const ys=uniqSorted(vals);
        return ys.slice(0,-1).map((y,i)=>{
          const ny=ys[i+1];
          const hit=vertGroup.find(g=>
            Math.abs(Math.min(g.a.y,g.b.y)-y)<eps &&
            Math.abs(Math.max(g.a.y,g.b.y)-ny)<eps
          );
          return {i:"chain"+i,a:{x,y},b:{x,y:ny},len:cleanNum(Math.abs(cadYForVisualY(ny)-cadYForVisualY(y)),2),side,pathId:hit&&hit.pathId,segIdx:hit&&hit.segIdx,isCut:hit&&hit.isCut};
        }).filter(d=>d.len>1);
      }
    }

    function combinedRestDimsForSide(side,chain,total){
      // Zusatzmass: kleine Restsegmente neben dem laengsten Hauptmass zusammenfassen.
      // Funktioniert fuer horizontal und vertikal.
      if(!chain || chain.length<3) return [];
      let maxIdx=0;
      for(let i=1;i<chain.length;i++) if(chain[i].len>chain[maxIdx].len) maxIdx=i;
      const out=[];
      if(maxIdx>=2){
        const a=chain[0].a, b=chain[maxIdx-1].b;
        const len=(side==="top"||side==="bottom")?cleanNum(Math.abs(cadXForVisualX(b.x)-cadXForVisualX(a.x)),2):cleanNum(Math.abs(cadYForVisualY(b.y)-cadYForVisualY(a.y)),2);
        if(len>1 && len<total.len-1) out.push({i:"sumBefore",a,b,len,side,combined:true});
      }
      if(chain.length-maxIdx-1>=2){
        const a=chain[maxIdx+1].a, b=chain[chain.length-1].b;
        const len=(side==="top"||side==="bottom")?cleanNum(Math.abs(cadXForVisualX(b.x)-cadXForVisualX(a.x)),2):cleanNum(Math.abs(cadYForVisualY(b.y)-cadYForVisualY(a.y)),2);
        if(len>1 && len<total.len-1) out.push({i:"sumAfter",a,b,len,side,combined:true});
      }
      return out.filter(d=>!nearlySameDim(d,total));
    }

    function renderDINChain(side,group){
      const total=totalDimForSide(side);
      const chain=chainDimsForSide(side,group).filter(d=>!nearlySameDim(d,total));
      const sums=combinedRestDimsForSide(side,chain,total);
      // v195 CAD-Verhalten:
      // 1) Maße beginnen nahe an der Zeichnung.
      // 2) Wenn sich Textbereiche überschneiden, rutscht das Maß automatisch in die nächste Ebene.
      // 3) Gesamtmaß liegt außen.
      const basePx=8;
      const slotStep=24;
      const slots=[];
      function dimSpan(d){
        const horiz=(side==="top"||side==="bottom");
        const a=horiz?d.a.x:d.a.y;
        const b=horiz?d.b.x:d.b.y;
        const lo=Math.min(a,b), hi=Math.max(a,b);
        const label=String((d.isCut?"Δ ":"")+fmt(d.len));
        const pad=Math.max(90,label.length*42);
        return {lo:lo-pad/2,hi:hi+pad/2};
      }
      function chooseOffset(d,preferSlot){
        const sp=dimSpan(d);
        let slot=preferSlot||0;
        for(let guard=0;guard<30;guard++){
          const hit=slots.some(o=>o.slot===slot && !(sp.hi<o.lo || sp.lo>o.hi));
          if(!hit){
            slots.push({slot:slot,lo:sp.lo,hi:sp.hi});
            return basePx+slot*slotStep;
          }
          slot++;
        }
        slots.push({slot:slot,lo:sp.lo,hi:sp.hi});
        return basePx+slot*slotStep;
      }

      // kleine Teilmaße zuerst nah an die Zeichnung, lange weiter außen wenn nötig
      chain
        .map((d,idx)=>({d,idx}))
        .sort((a,b)=>a.d.len-b.d.len)
        .forEach(o=>{
          const off=chooseOffset(o.d,0);
          els.push(renderDimAtOuterPx("dimChainV195_"+side+"_"+o.idx,o.d,side,off,1.7,false));
        });

      sums.forEach((d,idx)=>{
        const off=chooseOffset(d,1);
        els.push(renderDimAtOuterPx("dimSumV195_"+side+"_"+idx,d,side,off,1.9,true));
      });

      const totalOff=chooseOffset(total,Math.max(2,slots.length));
      els.push(renderDimAtOuterPx("dimTotalV195_"+side,total,side,totalOff,2.2,true));
    }

    // v97: Maßketten strikt nur auf die Ausbruchseiten legen.
    // Regel: Ausbruch unten -> horizontale Maße unten, oben -> oben.
    //        Ausbruch rechts -> vertikale Maße rechts, links -> links.
    // Beispiel rechts/unten: unten horizontal + rechts vertikal.
    function signedArea(poly){
      let a=0;
      for(let i=0;i<poly.length;i++){
        const p=poly[i], q=poly[(i+1)%poly.length];
        a += p.x*q.y - q.x*p.y;
      }
      return a/2;
    }
    function concavePts(poly){
      if(!poly || poly.length<4) return [];
      const area=signedArea(poly);
      const ccw=area>0;
      const out=[];
      for(let i=0;i<poly.length;i++){
        const a=poly[(i-1+poly.length)%poly.length], b=poly[i], c=poly[(i+1)%poly.length];
        const ux=b.x-a.x, uy=b.y-a.y, vx=c.x-b.x, vy=c.y-b.y;
        const cross=ux*vy-uy*vx;
        if(ccw ? cross< -0.001 : cross>0.001) out.push(b);
      }
      return out;
    }
    function preferredDimSides(){
      const cps=concavePts(pts);
      const allDims=normalDims.concat(cutDims);

      function sideCoverage(side){
        let intervals=[];
        const eps=2;
        for(let i=0;i<pts.length;i++){
          const a=pts[i], b=pts[(i+1)%pts.length];
          const horiz=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
          if((side==="top"||side==="bottom") && horiz){
            const y=side==="top"?minY:maxY;
            if(Math.abs(a.y-y)<eps && Math.abs(b.y-y)<eps){
              intervals.push([Math.min(a.x,b.x),Math.max(a.x,b.x)]);
            }
          }
          if((side==="left"||side==="right") && !horiz){
            const x=side==="left"?minX:maxX;
            if(Math.abs(a.x-x)<eps && Math.abs(b.x-x)<eps){
              intervals.push([Math.min(a.y,b.y),Math.max(a.y,b.y)]);
            }
          }
        }
        if(!intervals.length) return 0;
        intervals.sort((a,b)=>a[0]-b[0]);
        let total=0, cur=intervals[0].slice();
        for(let i=1;i<intervals.length;i++){
          const it=intervals[i];
          if(it[0]<=cur[1]+eps) cur[1]=Math.max(cur[1],it[1]);
          else { total+=Math.max(0,cur[1]-cur[0]); cur=it.slice(); }
        }
        total+=Math.max(0,cur[1]-cur[0]);
        return total;
      }
      function hasH(side){return allDims.some(d=>d.side===side && Math.abs(d.b.x-d.a.x)>=Math.abs(d.b.y-d.a.y));}
      function hasV(side){return allDims.some(d=>d.side===side && Math.abs(d.b.y-d.a.y)>Math.abs(d.b.x-d.a.x));}
      function longestOuterSegment(side){
        let best=0;
        const eps=2;
        for(let i=0;i<pts.length;i++){
          const a=pts[i], b=pts[(i+1)%pts.length];
          const horiz=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
          if((side==="top"||side==="bottom") && horiz){
            const y=side==="top"?minY:maxY;
            if(Math.abs(a.y-y)<eps && Math.abs(b.y-y)<eps) best=Math.max(best,Math.abs(b.x-a.x));
          }
          if((side==="left"||side==="right") && !horiz){
            const x=side==="left"?minX:maxX;
            if(Math.abs(a.x-x)<eps && Math.abs(b.x-x)<eps) best=Math.max(best,Math.abs(b.y-a.y));
          }
        }
        return best;
      }
      function concaveMean(){
        if(!cps.length) return null;
        const sx=cps.reduce((s,p)=>s+p.x,0)/cps.length;
        const sy=cps.reduce((s,p)=>s+p.y,0)/cps.length;
        return {x:sx,y:sy};
      }
      function pickAxisSide(primaryA, primaryB, hasA, hasB, coverageA, coverageB, fullLen, meanPos, minPos, maxPos, fallbackA, fallbackB){
        const eps=Math.max(2,fullLen*0.01);
        const incompleteA = coverageA < fullLen - eps;
        const incompleteB = coverageB < fullLen - eps;

        // Wichtig: Wenn der Ausbruch eine Außenkante unterbricht,
        // muss die Maßkette auf genau diese Seite.
        if(incompleteA && !incompleteB) return primaryA;
        if(incompleteB && !incompleteA) return primaryB;
        if(incompleteA && incompleteB){
          if(Math.abs(coverageA-coverageB)>eps) return coverageA<coverageB ? primaryA : primaryB;
          if(meanPos!=null){
            const dA=Math.abs(meanPos-minPos), dB=Math.abs(maxPos-meanPos);
            if(Math.abs(dA-dB)>eps) return dA<dB ? primaryA : primaryB;
          }
          return primaryA;
        }

        // Kein direkter Außen-Ausbruch auf dieser Achse:
        // dann über innere Ecke / Schwerpunkt entscheiden.
        if(meanPos!=null){
          const dA=Math.abs(meanPos-minPos), dB=Math.abs(maxPos-meanPos);
          if(Math.abs(dA-dB)>eps) return dA<dB ? primaryA : primaryB;
        }

        // Letzter Fallback: kürzere Außenkante = eher Ausbruchseite,
        // sonst Standard unten bzw. rechts.
        return fallbackA && !fallbackB ? primaryA : (fallbackB && !fallbackA ? primaryB : primaryB);
      }

      const topCov=sideCoverage("top"), bottomCov=sideCoverage("bottom");
      const leftCov=sideCoverage("left"), rightCov=sideCoverage("right");
      const fullW=Math.max(1,Math.abs(maxX-minX));
      const fullH=Math.max(1,Math.abs(maxY-minY));
      const topLong=longestOuterSegment("top"), bottomLong=longestOuterSegment("bottom");
      const leftLong=longestOuterSegment("left"), rightLong=longestOuterSegment("right");
      const cm=concaveMean();

      let hSide = pickAxisSide(
        "top","bottom",
        hasH("top"),hasH("bottom"),
        topCov,bottomCov,fullW,
        cm?cm.y:null,minY,maxY,
        topLong<bottomLong,bottomLong<topLong
      );
      let vSide = pickAxisSide(
        "left","right",
        hasV("left"),hasV("right"),
        leftCov,rightCov,fullH,
        cm?cm.x:null,minX,maxX,
        leftLong<rightLong,rightLong<leftLong
      );

      if(!hasH(hSide) && hasH(hSide==="bottom"?"top":"bottom")) hSide=hSide==="bottom"?"top":"bottom";
      if(!hasV(vSide) && hasV(vSide==="right"?"left":"right")) vSide=vSide==="right"?"left":"right";

      // v130 FIX: Bei nachträglichem Eckausbruch können mehrere Außenkanten betroffen sein.
      // Beispiel: Ausbruch oben UND rechts. Dann dürfen nicht nur unten/rechts Maße kommen,
      // sondern jede unterbrochene Ausbruchseite bekommt ihre eigene Kettenmaß-Seite.
      const epsW=Math.max(2,fullW*0.01), epsH=Math.max(2,fullH*0.01);
      const sides=[];
      function addSide(s){
        if(!s || sides.indexOf(s)>=0) return;
        if((s==="top"||s==="bottom") && !hasH(s)) return;
        if((s==="left"||s==="right") && !hasV(s)) return;
        sides.push(s);
      }
      if(topCov < fullW-epsW) addSide("top");
      if(bottomCov < fullW-epsW) addSide("bottom");
      if(leftCov < fullH-epsH) addSide("left");
      if(rightCov < fullH-epsH) addSide("right");
      addSide(hSide);
      addSide(vSide);
      return sides;
    }

    let allowedSides=preferredDimSides();
// v228 FIX: obere/untere Maßkette immer behalten
if(!allowedSides.includes("top")) allowedSides.push("top");
if(!allowedSides.includes("bottom")) allowedSides.push("bottom");
cutDims.forEach(d=>{ if(d.side && !allowedSides.includes(d.side)) allowedSides.push(d.side); });

    // v251: Normale Maßketten nur rendern wenn showDim aktiv ist.
    // Wenn nur Schräge gewählt → diesen Teil überspringen, Schräg-Render unten läuft trotzdem.
    if(showDim){
      allowedSides.forEach(side=>{
        // v236: Eckausbruch-Schenkel werden in die Maßkette aufgenommen,
        // aber nur auf der korrekt berechneten Original-Seite.
        const group=normalDims.filter(d=>d.side===side).concat(cutDims.filter(d=>d.side===side));
        renderDINChain(side,group);
      });
    }

    // v120: Schräge Kanten bekommen immer ein eigenes Schrägmaß,
    // egal auf welcher Seite sie liegen. Die Maßketten selbst bleiben
    // weiterhin nur auf der Ausbruch-Seite.
    normalDims.forEach((d,idx)=>{
      const dx=Math.abs(d.b.x-d.a.x), dy=Math.abs(d.b.y-d.a.y);
      if(showDiagonalDims && dx>1 && dy>1){
        els.push(renderOneDim("dimSlopeV171_"+idx+"_"+d.a.x+"_"+d.a.y, d.a, d.b, STEP_DIM_PX*1.2, 1.9));
      }
    });

    return els;
  }


  // ── Radius labels: nur Text, ohne Kreis, symmetrisch an Rundecken ─────
  function radiusLabelsForPath(path){
    const els=[];
    const fmtR=(r,cadR)=>{
      // v295: Radien sind absolute CAD-Parameter. Wenn vorhanden, gespeicherten CAD-Radius anzeigen.
      const val=(cadR!=null)?cadR:cadLen(r,path.id);
      const s=String(toDisp(val)).replace(".",",");
      return "R"+s;
    };
    const labelText=(key,x,y,text,col="#16a34a")=>React.createElement('text',{
      key,x,y,textAnchor:"middle",fontSize:9,fontWeight:"1200",fill:col,
      stroke:"#fff",strokeWidth:7,paintOrder:"stroke",style:{pointerEvents:"none"}
    },text);

    function cornerLabel(key,p,cx,cy,r){
      const s=w2s(p.x,p.y,pan,zoom);
      const dx=p.x>=cx?1:-1;
      const dy=p.y>=cy?1:-1;

      // v238: Radius-Text näher an die Rundung.
      // 26px war zu weit und landete zu stark auf der Kante.
      const gap=10;
      return labelText(key,s.x+dx*gap,s.y+dy*gap,fmtR(r,p.cadR),"#2563eb");
    }

    const pts=_nullishCoalesce(path.pts, () => ([]));
    if(pts.length){
      const pcx=pts.reduce((a,p)=>a+p.x,0)/pts.length;
      const pcy=pts.reduce((a,p)=>a+p.y,0)/pts.length;
      pts.forEach((p,i)=>{
        const r=_nullishCoalesce(p.r, () => (0));
        if(r>0) els.push(cornerLabel("outerR"+i,p,pcx,pcy,r));
      });
    }

    (_nullishCoalesce(path.holes, () => ([]))).forEach((h,hi)=>{
      if(h.pts&&h.pts.length){
        const hcx=h.pts.reduce((a,p)=>a+p.x,0)/h.pts.length;
        const hcy=h.pts.reduce((a,p)=>a+p.y,0)/h.pts.length;
        h.pts.forEach((p,pi)=>{
          const r=_nullishCoalesce(p.r, () => (0));
          if(r>0) els.push(cornerLabel("holeCornerR"+hi+"_"+pi,p,hcx,hcy,r));
        });
      }
    });

    return els;
  }

  // ── Dim lines from KS to point ────────────────────────────
  function dimLines(pt,ks,col,ref){

    s.src = src;
    s.onload = resolve;
    s.onerror = function() {
      if (fallback) {
        var s2 = document.createElement('script');
        s2.src = fallback;
        s2.onload = resolve;

        document.head.appendChild(s2);

    };
    document.head.appendChild(s);
  });
}
