<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pro CAD Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#111;color:#fff}
#toolbar{
position:fixed;
left:0;
top:0;
width:100px;
height:100vh;
background:#1b1b1b;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
border-right:1px solid #333;
z-index:10;
overflow:auto;
}
.tool{
background:#2d2d2d;
border:none;
color:#fff;
padding:14px;
border-radius:14px;
font-size:14px;
}
.tool.active{background:#0078ff}
#topbar{
position:fixed;
left:100px;
right:0;
top:0;
height:60px;
background:#181818;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #333;
z-index:5;
}
#statusbar{
position:fixed;
left:100px;
right:0;
bottom:0;
height:42px;
background:#181818;
display:flex;
align-items:center;
padding:0 20px;
border-top:1px solid #333;
font-size:14px;
}
#rightpanel{
position:fixed;
right:0;
top:60px;
bottom:42px;
width:240px;
background:#1a1a1a;
border-left:1px solid #333;
padding:15px;
z-index:5;
}
#canvas{
position:absolute;
left:100px;
top:60px;
right:240px;
bottom:42px;
background:#101010;
touch-action:none;
}
.card{
background:#262626;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}
</style>
</head>
<body>

<div id="toolbar">
<button class="tool active">Linie</button>
<button class="tool">Rechteck</button>
<button class="tool">Kreis</button>
<button class="tool">Snap</button>
<button class="tool">Layer</button>
<button class="tool">3D</button>
<button class="tool">Cloud</button>
<button class="tool">DXF</button>
<button class="tool">Trim</button>
<button class="tool">Offset</button>
</div>

<div id="topbar">
<div>
<h3>Pro CAD Mobile</h3>
<small>Samsung Galaxy Tab S9 Ultra Optimiert</small>
</div>
<div>
DXF Aktiv | Snap EIN | Cloud Verbunden
</div>
</div>

<canvas id="canvas"></canvas>

<div id="rightpanel">
<h3>Eigenschaften</h3>
<div class="card">Aktives Werkzeug: Linie</div>
<div class="card">Layer: Architektur</div>
<div class="card">Linienstärke: 2.5 mm</div>
<div class="card">3D Modul: Bereit</div>
<div class="card">S-Pen: Verbunden</div>
</div>

<div id="statusbar">
X: 0 | Y: 0 | Zoom: 100% | Snap: EIN
</div>

<script>
const canvas=document.getElementById('canvas')
const ctx=canvas.getContext('2d')
const statusbar=document.getElementById('statusbar')

function resize(){
canvas.width=window.innerWidth-340
canvas.height=window.innerHeight-102
canvas.style.width=(window.innerWidth-340)+'px'
canvas.style.height=(window.innerHeight-102)+'px'
redraw()
}

window.addEventListener('resize',resize)
resize()

let drawing=false
let startX=0
let startY=0
let shapes=[]

function grid(){
ctx.strokeStyle='#222'
ctx.lineWidth=1
for(let x=0;x<canvas.width;x+=40){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}
for(let y=0;y<canvas.height;y+=40){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}
}

function redraw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
grid()

shapes.forEach(s=>{
ctx.strokeStyle='#00a2ff'
ctx.lineWidth=3
ctx.beginPath()
ctx.moveTo(s.x1,s.y1)
ctx.lineTo(s.x2,s.y2)
ctx.stroke()

ctx.fillStyle='#44ff88'
ctx.beginPath()
ctx.arc(s.x1,s.y1,5,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(s.x2,s.y2,5,0,Math.PI*2)
ctx.fill()

ctx.fillStyle='#ff5555'
ctx.font='16px Arial'
ctx.fillText(Math.round(Math.hypot(s.x2-s.x1,s.y2-s.y1))+' mm',s.x2+10,s.y2)
})
}

canvas.addEventListener('pointerdown',e=>{
drawing=true
startX=e.offsetX
startY=e.offsetY
})

canvas.addEventListener('pointerup',e=>{
if(!drawing)return

drawing=false
shapes.push({
x1:startX,
y1:startY,
x2:e.offsetX,
y2:e.offsetY
})
redraw()
})

canvas.addEventListener('pointermove',e=>{
statusbar.innerHTML=`X: ${Math.round(e.offsetX)} | Y: ${Math.round(e.offsetY)} | Zoom: 100% | Snap: EIN`
})

redraw()
</script>

</body>
</html>
