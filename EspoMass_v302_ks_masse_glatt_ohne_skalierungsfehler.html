const _jsxFileName = ""; function _nullishCoalesce(lhs, rhsFn) { if (lhs != null) { return lhs; } else { return rhsFn(); } } function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }
// ── Math helpers ──────────────────────────────────────────────
function w2s(wx,wy,pan,zoom){return{x:wx*zoom+pan.x,y:wy*zoom+pan.y};}
function s2w(sx,sy,pan,zoom){return{x:(sx-pan.x)/zoom,y:(sy-pan.y)/zoom};}
function snapG(v,g){return Math.round(v/g)*g;}
function toKS(wx,wy,ks){return{x:Math.round(wx-ks.x),y:Math.round(wy-ks.y)};}
function fromKS(rx,ry,ks){return{x:rx+ks.x,y:ry+ks.y};}
function mmLen(a,b){return Math.round(Math.hypot(b.x-a.x,b.y-a.y));}
function clone(x){return (typeof structuredClone=="function")?structuredClone(x):JSON.parse(JSON.stringify(x));}

function samePt(a,b){return Math.abs(a.x-b.x)<0.001&&Math.abs(a.y-b.y)<0.001;}
function collinear(a,b,c){
  return (Math.abs(a.x-b.x)<0.001&&Math.abs(b.x-c.x)<0.001) ||
         (Math.abs(a.y-b.y)<0.001&&Math.abs(b.y-c.y)<0.001);
}
function simplifyClosedPts(pts){
  if(!pts||pts.length<3)return pts;
  let arr=pts.map(p=>({...p}));
  // doppelte Abschluss-/Nullpunkte entfernen
  for(let guard=0;guard<50;guard++){
    let changed=false;
    if(arr.length>2&&samePt(arr[0],arr[arr.length-1])){arr.pop();changed=true;}
    for(let i=0;i<arr.length&&arr.length>2;i++){
      const n=(i+1)%arr.length;
      if(samePt(arr[i],arr[n])){arr.splice(n,1);changed=true;break;}
    }
    if(!changed)break;
  }
  // kollineare Punkte entfernen: dadurch verschwindet z.B. der letzte Überstand beim Schließen
  for(let guard=0;guard<100;guard++){
    let changed=false;
    for(let i=0;i<arr.length&&arr.length>2;i++){
      const prev=arr[(i-1+arr.length)%arr.length],cur=arr[i],next=arr[(i+1)%arr.length];

      // v233 GEOMETRIE-FIX:
      // Eckausbruch-Punkte dürfen niemals automatisch gelöscht werden.
      // Sonst wird der Ausbruch oben links/unten rechts später "verpasst"
      // oder als falsches Delta-Maß angezeigt.
      const isProtectedCornerCut =
        !!cur.cornerCutId ||
        !!prev.cornerCutId ||
        !!next.cornerCutId;

      const hasRadius=(_nullishCoalesce(cur.r, () => (0)))>0;
      if(!isProtectedCornerCut && !hasRadius&&collinear(prev,cur,next)){
        arr.splice(i,1);
        changed=true;
        break;
      }
    }
    if(!changed)break;
  }
  return arr;
}


// Point-in-polygon (ray casting)
function pointInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// Build SVG path with rounded corners
function buildPath(pts,closed,pan,zoom){
  if(!pts||pts.length<2)return"";
  const ss=pts.map(p=>w2s(p.x,p.y,pan,zoom));
  const n=pts.length;
  function unit(a,b){const dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy);return l===0?{x:0,y:0}:{x:dx/l,y:dy/l};}
  let d="";
  if(closed){
    for(let i=0;i<n;i++){
      const prev=ss[(i-1+n)%n],curr=ss[i],next=ss[(i+1)%n];
      const r=Math.min((_nullishCoalesce(pts[i].r, () => (0)))*zoom,Math.hypot(curr.x-prev.x,curr.y-prev.y)/2,Math.hypot(curr.x-next.x,curr.y-next.y)/2);
      if(r>0){
        const u1=unit(curr,prev),u2=unit(curr,next);
        const p1={x:curr.x+u1.x*r,y:curr.y+u1.y*r},p2={x:curr.x+u2.x*r,y:curr.y+u2.y*r};
        d+=(i===0?"M ":"L ")+p1.x+" "+p1.y+" Q "+curr.x+" "+curr.y+" "+p2.x+" "+p2.y;
      } else {
        d+=(i===0?"M ":"L ")+curr.x+" "+curr.y;
      }
    }
    d+=" Z";
  } else {
    for(let i=0;i<n;i++){
      const curr=ss[i];
      if(i===0||i===n-1){d+=(i===0?"M ":"L ")+curr.x+" "+curr.y;}
      else{
        const prev=ss[i-1],next=ss[i+1];
        const r=Math.min((_nullishCoalesce(pts[i].r, () => (0)))*zoom,Math.hypot(curr.x-prev.x,curr.y-prev.y)/2,Math.hypot(curr.x-next.x,curr.y-next.y)/2);
        if(r>0){
          const u1=unit(curr,prev),u2=unit(curr,next);
          const p1={x:curr.x+u1.x*r,y:curr.y+u1.y*r},p2={x:curr.x+u2.x*r,y:curr.y+u2.y*r};
          d+=" L "+p1.x+" "+p1.y+" Q "+curr.x+" "+curr.y+" "+p2.x+" "+p2.y;
        } else { d+=" L "+curr.x+" "+curr.y; }
      }
    }
  }
  return d;
}

// Circle hole as SVG arc path
function circlePath(cx,cy,r,pan,zoom){
  const s=w2s(cx,cy,pan,zoom),sr=r*zoom;
  return `M ${s.x-sr} ${s.y} A ${sr} ${sr} 0 1 0 ${s.x+sr} ${s.y} A ${sr} ${sr} 0 1 0 ${s.x-sr} ${s.y}`;
}

function holeD(hole,pan,zoom){
  if(hole.type==="circle")return circlePath(hole.cx,hole.cy,hole.r,pan,zoom);
  if(hole.pts)return buildPath(hole.pts,true,pan,zoom);
  return"";
}

  const [selectedAngleId,setSelectedAngleId]=useState(null);

  // v240: S-Pen Erkennung. Pen ist genauer → kleinerer Treffer-Bereich. Touch → größer (Finger).

  const [dialog,setDialog]=useState(null);
  const [curKS,setCurKS]=useState({x:0,y:0});
  const [titleBlock,setTitleBlock]=useState(function(){
    var d=new Date();
    var dd=String(d.getDate()).padStart(2,"0");
    var mm=String(d.getMonth()+1).padStart(2,"0");
    return {projekt:"",zeichnungsnr:"",datum:dd+"."+mm+"."+d.getFullYear(),massstab:"1:50",name:"",firma:"",bemerkungen:""};
  });

  function scaleValue(){
    const s=String((titleBlock&&titleBlock.massstab)||"1:50").trim();
    const m=s.match(/1\s*[:/]\s*(\d+(?:[\.,]\d+)?)/);
    if(m)return Math.max(1,Number(m[1].replace(",","."))||50);
    const n=Number(s.replace(",","."));
    return n>0?n:50;
  }
  function scaleLabel(){ return "M "+String((titleBlock&&titleBlock.massstab)||"1:50"); }
  function scaleZoomFactor(){
    // Wirkung: Maßstab 1:50 = normal, 1:25 = größer, 1:100 = kleiner
    return 50/scaleValue();
  }

  // ── Einheiten ─────────────────────────────────────────────
  // Intern immer mm. toDisp = mm→Anzeige, fromDisp = Eingabe→mm
  const cleanNum=(v,dec=3)=>{
    const n=Number(v);
    if(!isFinite(n)) return 0;
    const s=n.toFixed(dec).replace(/\.0+$/,"").replace(/(\.\d*?)0+$/,"$1");
    return Number(s);
  };
  const toDisp=(mm)=>{
    // v158: keine Aufrundung mehr. 7.5 bleibt 7.5.
    if(unit==="cm") return cleanNum(mm/10,2);
    if(unit==="m")  return cleanNum(mm/1000,4);
    return cleanNum(mm,3);
  };
  const fromDisp=(v)=>{
    // Komma-Eingaben sauber lesen: 7,5 bleibt 7.5 und wird nicht gerundet.
    const raw=String(v ?? "").trim().replace(",",".");
    const n=parseFloat(raw);
    if(isNaN(n)) return 0;
    if(unit==="cm") return cleanNum(n*10,3);
    if(unit==="m")  return cleanNum(n*1000,3);
    return cleanNum(n,3);
  };
  const uStep=()=>unit==="cm"?"0.01":unit==="m"?"0.001":"0.1";
  const uLabel=()=>unit;
  // Für Anzeige: Wert + Einheit als String
  const fmt=(mm)=>`${toDisp(mm)}${unit}`;
  const fmtXY=(x,y)=>`${toDisp(x)}/${toDisp(y)}`;
  // V111: CAD-Masswert bleibt erhalten, auch wenn eine Zeichnung visuell skaliert wird.
  // v274: CAD-Maße bleiben beim optischen Skalieren stabil.
  // Bei horizontalen/vertikalen Maßen wird getrennt cadScaleX/cadScaleY benutzt.
  // Dadurch springen Werte nach 50%, -10%, +10% nicht mehr auf falsche Zahlen.
  const pathCadScale=(pathId,axis)=>{
    const p=pathsRef.current.find(x=>x.id===pathId);
    if(!p)return 1;
    if(axis==="x" && p.cadScaleX)return p.cadScaleX;
    if(axis==="y" && p.cadScaleY)return p.cadScaleY;
    return p.cadScale||1;
  };
  const cadLen=(len,pathId,axis)=>cleanNum(len/(pathCadScale(pathId,axis)||1),2);
  // v302: KS-Maße dürfen nach Skalierung keine Pixel-/Umrechnungsreste anzeigen.
  // Große Maße werden auf das CAD-Raster geglättet (z. B. 1004.18 → 1000),
  // kleine Produktionsmaße wie 2/3mm bleiben exakt sichtbar.
  function cleanKsCadMeasure(v){
    const n=Number(v);
    if(!isFinite(n))return 0;
    const a=Math.abs(n);
    if(a<20)return cleanNum(n,2);
    if(a<100)return cleanNum(Math.round(n),2);
    return cleanNum(Math.round(n/10)*10,2);
  }
  const ksCadLen=(len,pathId,axis)=>cleanKsCadMeasure(cadLen(len,pathId,axis));
  // v289: Beim optischen Skalieren bleiben die ursprünglichen CAD-Koordinaten an jedem Punkt erhalten.
  // Maßzahlen werden bevorzugt aus diesen CAD-Koordinaten gelesen, nicht aus der skalierten Geometrie.
  const cadXOf=(pt)=>Number.isFinite(Number(pt&&pt.cadX))?Number(pt.cadX):Number(pt&&pt.x)||0;
  const cadYOf=(pt)=>Number.isFinite(Number(pt&&pt.cadY))?Number(pt.cadY):Number(pt&&pt.y)||0;
  const cadLenBetween=(a,b,pathId)=>{
    if(a&&b&&(a.cadX!=null||a.cadY!=null||b.cadX!=null||b.cadY!=null)){
      const dx=Math.abs(cadXOf(b)-cadXOf(a)), dy=Math.abs(cadYOf(b)-cadYOf(a));
      if(dx>=dy*4)return cleanNum(dx,2);
      if(dy>=dx*4)return cleanNum(dy,2);
      return cleanNum(Math.hypot(dx,dy),2);
    }
    const dx=Math.abs(b.x-a.x), dy=Math.abs(b.y-a.y);
    if(dx>=dy*4)return cadLen(dx,pathId,"x");
    if(dy>=dx*4)return cadLen(dy,pathId,"y");
    return cadLen(Math.hypot(dx,dy),pathId);
  };
  const [curAbs,setCurAbs]=useState({x:0,y:0});

      newLen:"Neue Länge", newX:"KS-B", newY:"KS-Höhe", radius:"Radius", relX:"B", relY:"H", absX:"B absolut", absY:"H absolut", moveB:"B versetzen", moveH:"H versetzen",

    else if(d.type==="editpt") order=["bDiff","hDiff","radius"];

    // Keine Neuberechnung aus Bounding-Boxen, damit Radien/Winkel/Maßwerte absolut stabil bleiben.
    const oldScaleX=pathCadScale(path.id,"x")||1;
    const oldScaleY=pathCadScale(path.id,"y")||1;
    const oldScale=pathCadScale(path.id)||1;
    const sxp=(pt)=>({
      ...pt,
      // CAD-Werte bleiben stabil; nur Bildschirm-/Geometrie-Koordinaten werden skaliert.
      cadX:_nullishCoalesce(pt.cadX, () => (pt.x)),
      cadY:_nullishCoalesce(pt.cadY, () => (pt.y)),
      cadR:_nullishCoalesce(pt.cadR, () => (pt.r)),
      x:Math.round(b.cx+(pt.x-b.cx)*proportionalFactor),
      y:Math.round(b.cy+(pt.y-b.cy)*proportionalFactor),
      r:pt.r?Math.max(0,Math.round(pt.r*proportionalFactor)):pt.r
    });
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==selectedPathId)return p;
      const newPts=p.pts.map(sxp);
      const newHoles=(_nullishCoalesce(p.holes, () => ([]))).map(h=>{
        if(h.type==="circle")return {...h,
          cadCx:_nullishCoalesce(h.cadCx, () => (h.cx)),
          cadCy:_nullishCoalesce(h.cadCy, () => (h.cy)),
          cadDia:_nullishCoalesce(h.cadDia, () => (cadLen(h.r*2,selectedPathId))),
          cx:Math.round(b.cx+(h.cx-b.cx)*proportionalFactor),
          cy:Math.round(b.cy+(h.cy-b.cy)*proportionalFactor),
          r:Math.max(1,h.r*proportionalFactor)
        };
        if(h.pts)return {...h,pts:h.pts.map(sxp)};
        return h;
      });
      const cadScaleX=oldScaleX*proportionalFactor;
      const cadScaleY=oldScaleY*proportionalFactor;
      const cadScaleAvg=oldScale*proportionalFactor;
      return {...p,
        cadScaleX:isFinite(cadScaleX)&&cadScaleX>0?cadScaleX:oldScaleX,
        cadScaleY:isFinite(cadScaleY)&&cadScaleY>0?cadScaleY:oldScaleY,
        cadScale:isFinite(cadScaleAvg)&&cadScaleAvg>0?cadScaleAvg:oldScale,
        pts:newPts,
        holes:newHoles
      };
    }));
    // v288: Freie Texte und Maßzahlen bleiben beim Skalieren lesbar.
    // Darum wird nur die Position mit der Geometrie mitgeführt, die Textgröße bleibt konstant.
    setTexts(ts=>ts.map(t=>!textBelongsToPath(t,path)?t:{...t,
      parentPathId:path.id,
      x:Math.round(b.cx+(t.x-b.cx)*proportionalFactor),
      y:Math.round(b.cy+(t.y-b.cy)*proportionalFactor),
      size:Math.max(8,Math.round(Number(t.size)||26))
    }));
    // v244: Winkel-Maße der Zeichnung mitskalieren.
    // Der WERT (deg) bleibt unverändert — Winkel ändern sich beim Skalieren nicht.
    // Nur Scheitelpunkt und Klick-Position werden um den Mittelpunkt b.cx/b.cy skaliert.
    setAngles(arr=>arr.map(a=>{
      if(a.pathId!==selectedPathId)return a;
      return {...a,
        vx:Math.round(b.cx+(a.vx-b.cx)*proportionalFactor),
        vy:Math.round(b.cy+(a.vy-b.cy)*proportionalFactor),
        labelX:(a.labelX!=null)?Math.round(b.cx+(a.labelX-b.cx)*proportionalFactor):a.labelX,
        labelY:(a.labelY!=null)?Math.round(b.cy+(a.labelY-b.cy)*proportionalFactor):a.labelY
      };
    }));
    // v272: Auch das aktive KS der ausgewählten Zeichnung mitskalieren.
    // Dadurch bleiben die KS-Werte zur Ecke beim optischen Skalieren gleich.
    setKsList(arr=>arr.map(k=>{
      const belongsToSelectedPath = k.parentPathId===selectedPathId;
      const isCurrentMeasureKS = activeKS && k.id===activeKS;
      if(!belongsToSelectedPath && !isCurrentMeasureKS)return k;
      return {...k,
        parentPathId: belongsToSelectedPath ? k.parentPathId : selectedPathId,
        x:Math.round(b.cx+(k.x-b.cx)*proportionalFactor),
        y:Math.round(b.cy+(k.y-b.cy)*proportionalFactor)
      };
    }));
  }

  function moveWholeHole(ref,wx,wy){
    if(!ref)return;
    if(!ref.hist){pushHist();ref.hist=true;}
    const nx=snapG(ref.cx+(wx-ref.startX),SNAP),ny=snapG(ref.cy+(wy-ref.startY),SNAP);
    const dx=nx-ref.cx,dy=ny-ref.cy;
    setPaths(ps=>ps.map(p=>p.id!==ref.pathId?p:{...p,holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>{
      if(h.id!==ref.holeId)return h;
      const o=ref.orig;
      if(o.type==="circle")return {...o,cx:Math.round(o.cx+dx),cy:Math.round(o.cy+dy)};
      if(o.pts)return {...o,pts:o.pts.map(pt=>({...pt,x:Math.round(pt.x+dx),y:Math.round(pt.y+dy)}))};
      return h;
    })}));
  }

  // V110: Zwei-Finger-Zoom über die ganze App-Fläche, nicht nur über dem SVG
  // v293 AutoCAD-Prinzip:
  // Zwei Finger bedeuten IMMER nur Ansicht-Zoom/-Pan.
  // Auch bei "Zeichnung EIN" wird niemals Geometrie skaliert.
  // Radien, Winkel, Seitenverhältnis und Maßwerte bleiben dabei absolut starr.
  function beginGlobalPinch(e){
    if(!e.touches || e.touches.length!==2 || !svgRef.current) return false;
    e.preventDefault();
    const a=e.touches[0], b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    pinchRef.current={d,zoom:zoomLatestRef.current,pan:{...panLatestRef.current}};
    panRef.current=null;
    dragRef.current=null;
    movedRef.current=true;
    return true;
  }

  function moveGlobalPinch(e){
    if(!e.touches || e.touches.length!==2 || !pinchRef.current || !svgRef.current) return false;
    e.preventDefault();
    const a=e.touches[0], b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    const sc=d/pinchRef.current.d;
    const cx=(a.clientX+b.clientX)/2, cy=(a.clientY+b.clientY)/2;
    const r=svgRef.current.getBoundingClientRect();
    const mx=cx-r.left, my=cy-r.top;
    const nz=Math.min(8,Math.max(0.15,pinchRef.current.zoom*sc));
    const ratio=nz/pinchRef.current.zoom;
    setPan({x:mx-ratio*(mx-pinchRef.current.pan.x),y:my-ratio*(my-pinchRef.current.pan.y)});
    setZoom(nz);
    return true;
  }

  const onAppTouchStartCapture=(e)=>{
    if(e.touches && e.touches.length===2){
      beginGlobalPinch(e);
      e.stopPropagation();
    }
  };

  const onAppTouchMoveCapture=(e)=>{
    if(e.touches && e.touches.length===2 && pinchRef.current){
      moveGlobalPinch(e);
      e.stopPropagation();
    }
  };

  const onAppTouchEndCapture=(e)=>{
    if(!e.touches || e.touches.length<2){
      pinchRef.current=null;
      if(!e.touches || e.touches.length===0){
        panRef.current=null;
        dragRef.current=null;
        movedRef.current=false;
      }
    }
  };

  // ── Touch ──────────────────────────────────────────────────
  const onTS=(e)=>{
    if(e.touches.length===2){
      if(!pinchRef.current) beginGlobalPinch(e);
      return;
    }
    const{sx,sy}=evXY(e);
    if(pathSelectMode&&tool==="select"){
      const w=s2w(sx,sy,pan,zoom);
      const p=findPathForSelect(w.x,w.y,sx,sy);
      if(p){startPathMove(p,w.x,w.y);return;}
    }
    if((tool==="select"||tool==="text")&&!editMode){
      const w=s2w(sx,sy,pan,zoom);
      const t=hitTextAt(w.x,w.y);
      if(t){startTextMove(t,w.x,w.y);return;}
    }
    // v269: Eckpunkt ziehen darf KEINE einzelne Linie/Ecke verformen.
    // Ganze Zeichnung verschieben bleibt nur über „Zeichnung EIN“ aktiv.
    if(editMode || tool==="select"){
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<24){dragRef.current={pathId:path.id,ptIdx:i,isHole:false,canMove:false};movedRef.current=false;return;}
        }
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.pts){
            for(let i=0;i<hole.pts.length;i++){
              const s=w2s(hole.pts[i].x,hole.pts[i].y,pan,zoom);
              if(Math.hypot(sx-s.x,sy-s.y)<24){dragRef.current={pathId:path.id,holeId:hole.id,ptIdx:i,isHole:true};movedRef.current=false;return;}
            }
          }
        }
      }
      if(editMode){
        const w=s2w(sx,sy,pan,zoom);
        for(const path of pathsRef.current){
          for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
            if(hitHole(hole,w.x,w.y,sx,sy)){startHoleMove(path,hole,w.x,w.y);return;}
          }
        }
      }
    }
    if(tool==="select"&&!editMode)panRef.current={tx:e.touches[0].clientX,ty:e.touches[0].clientY,px:pan.x,py:pan.y};
  };

  const onTM=(e)=>{
    e.preventDefault();
    if(e.touches.length===2&&pinchRef.current){
      moveGlobalPinch(e);
      return;
    }
    const{sx,sy}=evXY(e);
    if(dragRef.current){
      movedRef.current=true;
      const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);
      if(dragRef.current.kind==="holeMove"){moveWholeHole(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="cornerPathMove"){moveWholePath(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="pathMove"){moveWholePath(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="textMove"){moveWholeText(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.canMove===false){return;}
      const{pathId,holeId,ptIdx,isHole}=dragRef.current;
      if(isHole){
        setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>h.id!==holeId?h:{...h,pts:h.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)})}));
      } else {
        setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,pts:p.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)}));
      }
      return;
    }
    if(panRef.current)setPan({x:panRef.current.px+e.touches[0].clientX-panRef.current.tx,y:panRef.current.py+e.touches[0].clientY-panRef.current.ty});
    updateCursor(sx,sy);
  };

  function openDragTargetDialog(ref){
    if(!ref)return;
    if(ref.kind==="holeMove"){
      const path=pathsRef.current.find(p=>p.id===ref.pathId);
      const hole=path&&(_nullishCoalesce(path.holes, () => ([]))).find(h=>h.id===ref.holeId);
      if(path&&hole){openHoleEditDialog(path.id,hole);return;}
      return;
    }
    if(ref.kind==="textMove"){ editSelectedText(); return; }
    if(ref.isHole){
      const path=pathsRef.current.find(p=>p.id===ref.pathId);
      const hole=path&&(_nullishCoalesce(path.holes, () => ([]))).find(h=>h.id===ref.holeId);
      if(path&&hole){openHoleEditDialog(path.id,hole);return;}
    }
    // v301: Wenn ein sichtbares aktives KS vorhanden ist, öffnet der Eckpunkt
    // direkt „KS-Maße ändern“ (B + H Übernahme).
    if(openKsDimForCorner(ref))return;
    setSelectedKsCorner({pathId:ref.pathId, ptIdx:ref.ptIdx});
    openPtDialog(ref);
  }

  const onTE=()=>{
    if(dragRef.current&&!movedRef.current)openDragTargetDialog(dragRef.current);
    pinchRef.current=null;panRef.current=null;dragRef.current=null;movedRef.current=false;
  };

  const onMD=(e)=>{
    const{sx,sy}=evXY(e);
    if(pathSelectMode&&tool==="select"){
      const w=s2w(sx,sy,pan,zoom);
      const p=findPathForSelect(w.x,w.y,sx,sy);
      if(p){startPathMove(p,w.x,w.y);return;}
    }
    if((tool==="select"||tool==="text")&&!editMode){
      const w=s2w(sx,sy,pan,zoom);
      const t=hitTextAt(w.x,w.y);
      if(t){startTextMove(t,w.x,w.y);return;}
    }
    if(editMode || tool==="select"){
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<18){dragRef.current={pathId:path.id,ptIdx:i,isHole:false,canMove:false};movedRef.current=false;return;}
        }
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.pts){for(let i=0;i<hole.pts.length;i++){
            const s=w2s(hole.pts[i].x,hole.pts[i].y,pan,zoom);
            if(Math.hypot(sx-s.x,sy-s.y)<18){dragRef.current={pathId:path.id,holeId:hole.id,ptIdx:i,isHole:true};movedRef.current=false;return;}
          }}
        }
      }
      const w=s2w(sx,sy,pan,zoom);
      for(const path of pathsRef.current){
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hitHole(hole,w.x,w.y,sx,sy)){startHoleMove(path,hole,w.x,w.y);return;}
        }
      }
    }
    if(tool==="select"&&!editMode)panRef.current={tx:e.clientX,ty:e.clientY,px:pan.x,py:pan.y};
    movedRef.current=false;
  };

  const onMM=(e)=>{
    if(!svgRef.current)return;
    const{sx,sy}=evXY(e);updateCursor(sx,sy);
    if(dragRef.current&&e.buttons===1){
      movedRef.current=true;
      const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);
      if(dragRef.current.kind==="holeMove"){moveWholeHole(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="cornerPathMove"){moveWholePath(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="pathMove"){moveWholePath(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.kind==="textMove"){moveWholeText(dragRef.current,w.x,w.y);return;}
      if(dragRef.current.canMove===false){return;}
      const{pathId,holeId,ptIdx,isHole}=dragRef.current;
      if(isHole){setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>h.id!==holeId?h:{...h,pts:h.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)})}));}
      else{setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,pts:p.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)}));}
      return;
    }
    if(panRef.current&&e.buttons===1){movedRef.current=true;setPan({x:panRef.current.px+e.clientX-panRef.current.tx,y:panRef.current.py+e.clientY-panRef.current.ty});}
  };

  const onMU=()=>{
    if(dragRef.current&&!movedRef.current)openDragTargetDialog(dragRef.current);
    dragRef.current=null;panRef.current=null;movedRef.current=false;
  };

  const onWheel=(e)=>{
    e.preventDefault();const{sx,sy}=evXY(e);
    const nz=Math.min(8,Math.max(0.15,zoom*(e.deltaY>0?0.9:1.1))),r=nz/zoom;
    setPan({x:sx-r*(sx-pan.x),y:sy-r*(sy-pan.y)});setZoom(nz);
  };

  // ── Canvas click ──────────────────────────────────────────
  const onCanvasClick=(e)=>{
    if(!svgRef.current)return;
    if(movedRef.current){movedRef.current=false;return;}
    const{sx,sy}=evXY(e);
    const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);

    // v300: Element-Treffer haben Vorrang vor Dismiss.
    // So können Text, Ecken, Löcher und Ausbrüche jederzeit wieder aktiviert und korrigiert werden.
    if(activateEditableAt(sx,sy,w))return;
    // v299/v300: Klick/Tap ins leere Raster schließt offene Dialoge, Dropdowns und Zahlenfeld.
    if(dialog){dismissFloatingUI();return;}

    // v253: Klick auf leere Stelle → Winkel-Auswahl zurücksetzen
    if(selectedAngleId) setSelectedAngleId(null);

    // v249: Klick auf leere Stelle → KS-Maße verschwinden lassen
    // (Wird zurückgesetzt am Ende, wenn keine andere Aktion zugeschlagen hat — siehe unten.)

    // v242 Winkel-Werkzeug (AutoCAD-Stil): 3 Klicks
    //   Klick 1: 1. Kante
    //   Klick 2: 2. Kante → Vorschau erscheint, folgt dem Pen
    //   Klick 3: Wo der Bogen liegen soll (legt Innen/Außen fest, Wert wird entsprechend gespeichert)
    if(tool==="angle"){
      const HR=hitRadius();
      // Schritt 3: Klick legt Bogen-Position fest und speichert.
      if(anglePending && anglePending.segB!==undefined){
        const path=pathsRef.current.find(p=>p.id===anglePending.pathId);
        if(!path){setAnglePending(null);setAnglePreviewPt(null);return;}
        const a1=path.pts[anglePending.segA], b1=path.pts[(anglePending.segA+1)%path.pts.length];
        const a2=path.pts[anglePending.segB], b2=path.pts[(anglePending.segB+1)%path.pts.length];
        const vx=anglePending.vx, vy=anglePending.vy;
        // Vektoren vom Scheitel zum jeweils anderen Endpunkt der Kante
        function farFrom(p1,p2){
          return Math.hypot(p1.x-vx,p1.y-vy)>Math.hypot(p2.x-vx,p2.y-vy)?p1:p2;
        }
        const e1=farFrom(a1,b1), e2=farFrom(a2,b2);
        const u1x=e1.x-vx, u1y=e1.y-vy, m1=Math.hypot(u1x,u1y);
        const u2x=e2.x-vx, u2y=e2.y-vy, m2=Math.hypot(u2x,u2y);
        if(m1<0.001||m2<0.001){setAnglePending(null);setAnglePreviewPt(null);return;}
        // Klick-Position relativ zum Scheitel
        const cx=w.x-vx, cy=w.y-vy;
        // Welcher Sektor wurde gewählt? — über Kreuzprodukte gegen u1 und u2
        // smallAngle: kleinerer Winkel zwischen u1 und u2 (0..180°)
        const dot=u1x*u2x+u1y*u2y;
        const cosA=Math.max(-1,Math.min(1, dot/(m1*m2)));
        const smallDeg = Math.acos(cosA)*180/Math.PI;  // 0..180
        // Test ob Klick im "kleinen" Sektor liegt
        // Die Halbierende des kleinen Sektors ist u1/m1 + u2/m2
        const bisX=u1x/m1+u2x/m2, bisY=u1y/m1+u2y/m2;
        const bisM=Math.hypot(bisX,bisY);
        let kind, deg;
        if(bisM<0.001){
          // 180°-Sonderfall — egal wo geklickt wird
          kind="inner"; deg=180;
        } else {
          const dotBis = (cx*bisX+cy*bisY)/bisM;
          if(dotBis>0){
            // Klick ist auf der Innen-Halbierenden-Seite → kleiner Winkel
            kind="inner"; deg=Math.round(smallDeg*10)/10;
          } else {
            // Klick auf der Gegenseite → großer Winkel (360 - klein)
            kind="outer"; deg=Math.round((360-smallDeg)*10)/10;
          }
        }
        pushHist();
        setAngles(arr=>[...arr,{
          id:uid(),
          pathId:anglePending.pathId,
          segA:anglePending.segA, segB:anglePending.segB,
          vx:vx, vy:vy,
          deg:deg,
          kind:kind,
          labelX:Math.round(w.x), labelY:Math.round(w.y) // wo der Klick war = wo das Label landet
        }]);
        setAnglePending(null);
        setAnglePreviewPt(null);
        return;
      }
      // Schritt 1+2: Kante finden
      let hit=null;
      for(const path of pathsRef.current){
        const n=path.closed?path.pts.length:path.pts.length-1;
        for(let i=0;i<n;i++){
          const a=path.pts[i],b=path.pts[(i+1)%path.pts.length];
          const sa=w2s(a.x,a.y,pan,zoom),sb=w2s(b.x,b.y,pan,zoom);
          const dx=sb.x-sa.x,dy=sb.y-sa.y,len2=dx*dx+dy*dy;
          if(len2===0)continue;
          const t=Math.max(0,Math.min(1,((sx-sa.x)*dx+(sy-sa.y)*dy)/len2));
          if(Math.hypot(sx-(sa.x+t*dx),sy-(sa.y+t*dy))<HR){
            hit={pathId:path.id,segIdx:i};
            break;
          }
        }
        if(hit)break;
      }
      if(!hit){
        setAnglePending(null);
        setAnglePreviewPt(null);
        closeDropMenus();
        return;
      }
      if(!anglePending){
        // Schritt 1 → Schritt 2
        setAnglePending({pathId:hit.pathId, segA:hit.segIdx});
        return;
      }
      if(anglePending.pathId!==hit.pathId || anglePending.segA===hit.segIdx){
        // Andere Zeichnung oder gleiche Kante → von vorn beginnen
        setAnglePending({pathId:hit.pathId, segA:hit.segIdx});
        return;
      }
      // Schritt 2 → Schritt 3: 2. Kante gewählt, Scheitelpunkt bestimmen, jetzt auf Klick warten
      const path=pathsRef.current.find(p=>p.id===hit.pathId);
      if(!path){setAnglePending(null);return;}
      const a1=path.pts[anglePending.segA], b1=path.pts[(anglePending.segA+1)%path.pts.length];
      const a2=path.pts[hit.segIdx], b2=path.pts[(hit.segIdx+1)%path.pts.length];
      // Scheitel = gemeinsamer Endpunkt (oder nächster)
      const candidates=[
        {p:a1, d:Math.min(Math.hypot(a1.x-a2.x,a1.y-a2.y),Math.hypot(a1.x-b2.x,a1.y-b2.y))},
        {p:b1, d:Math.min(Math.hypot(b1.x-a2.x,b1.y-a2.y),Math.hypot(b1.x-b2.x,b1.y-b2.y))}
      ];
      candidates.sort((u,v)=>u.d-v.d);
      const vertex=candidates[0].p;
      setAnglePending({pathId:hit.pathId, segA:anglePending.segA, segB:hit.segIdx, vx:vertex.x, vy:vertex.y});
      setAnglePreviewPt({x:w.x, y:w.y});
      return;
    }

    if(editMode){
      // Prüfe ob Punkt getroffen (handled by onMU)
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<22)return;
        }
      }
      // Segment antippen → Länge ändern
      for(const path of pathsRef.current){
        const n=path.closed?path.pts.length:path.pts.length-1;
        for(let i=0;i<n;i++){
          const a=path.pts[i],b=path.pts[(i+1)%path.pts.length];
          const sa=w2s(a.x,a.y,pan,zoom),sb=w2s(b.x,b.y,pan,zoom);
          const dx=sb.x-sa.x,dy=sb.y-sa.y,len2=dx*dx+dy*dy;
          if(len2===0)continue;
          const t=Math.max(0,Math.min(1,((sx-sa.x)*dx+(sy-sa.y)*dy)/len2));
          if(Math.hypot(sx-(sa.x+t*dx),sy-(sa.y+t*dy))<22){
            openDialog({type:"editlen",pathId:path.id,segIdx:i,len:cadLenBetween(a,b,path.id),newLen:cadLenBetween(a,b,path.id)});
            return;
          }
        }
      }
      // Klick INNERHALB eines Lochs → Loch bearbeiten
      for(const path of pathsRef.current){
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.type==="circle"){
            const d2=Math.hypot(w.x-hole.cx,w.y-hole.cy);
            if(d2<hole.r){openHoleEditDialog(path.id,hole);return;}
          } else if(hole.pts&&pointInPoly(w.x,w.y,hole.pts)){
            openHoleEditDialog(path.id,hole);return;
          }
        }
      }
      // Wenn ein Loch/Ausbruch kopiert wurde: in Bearbeitung auf freie Fläche tippen = einfügen (Stempel bleibt aktiv)
      if(copyHole){
        for(const path of pathsRef.current){
          if(path.closed&&pointInPoly(w.x,w.y,path.pts)){
            pasteCopiedHole(path.id,w.x,w.y);
            return;
          }
        }
      }
      dismissFloatingUI();return;
    }

    // Textwerkzeug
    if(tool==="text"){
      const hitText=hitTextAt(w.x,w.y);
      if(hitText){
        setSelectedTextId(hitText.id);
        openTextDialogForEdit(hitText.id);
        return;
      }
      createTextAt(wx,wy);
      return;
    }

    // Normal mode: Auswahl
    if(tool==="select"){
      const hitText=hitTextAt(w.x,w.y);
      if(hitText){
        setSelectedTextId(hitText.id);
        setSelectedPathId(null);
        setSel(null);
        setSelHole(null);
        openTextDialogForEdit(hitText.id);
        return;
      }
      if(pathSelectMode){
        if(selectPathByTap(w.x,w.y,sx,sy))return;
        return;
      }
      // 1) Spezialfall: Tipp direkt IN einen Lavabo-Ausbruch erzeugt ein neues rundes Lavabo-Loch
      //    mit Ø35mm und Label Lavabo. Deshalb muss diese Prüfung VOR dem normalen Bearbeiten kommen.
      for(const parent of pathsRef.current){
        if(!parent.closed || !pointInPoly(w.x,w.y,parent.pts)) continue;
        for(const p of pathsRef.current){
          for(const h of (_nullishCoalesce(p.holes, () => []))){
            if(h.label==="Lavabo" && h.pts && h.pts.length>=4 && pointInPoly(w.x,w.y,h.pts)){
              const cx=h.pts.reduce((s,pt)=>s+pt.x,0)/h.pts.length;
              const minY=Math.min(...h.pts.map(pt=>pt.y));
              const snapX=Math.round(cx);
              const snapY=Math.round(minY-55);
              const ks=getKS();
              const rel=toDrawingBH(snapX,snapY,parent.id);
              openDialog({type:"holemenu",pathId:parent.id,relX:rel.x,relY:rel.y,absX:snapX,absY:snapY,baseRelX:rel.x,baseRelY:rel.y,baseAbsX:snapX,baseAbsY:snapY,ksId:activeKS,
                durchmesser:35,
                breite:"",hoehe:"",moveB:"",moveH:"",rAll:"",rTL:"",rTR:"",rBR:"",rBL:"",
                subtype:"circle",
                label:"Lavabo"
              });
              return;
            }
          }
        }
      }

      // 2) Andere vorhandene Löcher/Ausbrüche antippen → bearbeiten
      for(const path of pathsRef.current){
        for(const hole of(_nullishCoalesce(path.holes, () => []))){
          if(hole.type==="circle"){
            const d2=Math.hypot(w.x-hole.cx,w.y-hole.cy);
            if(d2<hole.r){openHoleEditDialog(path.id,hole);return;}
          } else if(hole.pts&&pointInPoly(w.x,w.y,hole.pts)){
            openHoleEditDialog(path.id,hole);return;
          }
        }
      }

      // 3) Klick in geschlossene Fläche ausserhalb Lavabo → neues Loch-Menü komplett leer
      for(const path of pathsRef.current){
        if(path.closed&&pointInPoly(w.x,w.y,path.pts)){
          const ks=getKS();
          const snapX=Math.round(w.x), snapY=Math.round(w.y);
          const rel=toDrawingBH(snapX,snapY,path.id);
          openDialog({type:"holemenu",pathId:path.id,relX:rel.x,relY:rel.y,absX:snapX,absY:snapY,baseRelX:rel.x,baseRelY:rel.y,baseAbsX:snapX,baseAbsY:snapY,ksId:activeKS,
            durchmesser:"",
            breite:"",hoehe:"",moveB:"",moveH:"",rAll:"",rTL:"",rTR:"",rBR:"",rBL:"",
            subtype:"circle",
            label:""
          });
          return;
        }
      }
      dismissFloatingUI();return;
    }

    if(tool==="pfad"){
      if(!draft){setDraft({pts:[{id:uid(),x:wx,y:wy}]});setLenInput("");setNumPad({target:"len",label:"Länge",value:""});}
      else{
        if(draft.pts.length>=3){
          const fs=w2s(draft.pts[0].x,draft.pts[0].y,pan,zoom);
          if(Math.hypot(sx-fs.x,sy-fs.y)<26){
            // Beim Schliessen: 90°-Eckpunkt automatisch einfügen wenn nötig
            const first=draft.pts[0];
            const last=draft.pts[draft.pts.length-1];
            const dx=Math.abs(last.x-first.x),dy=Math.abs(last.y-first.y);
            let finalPts=draft.pts;
            if(dx>1&&dy>1){
              // Beide Eckpunkt-Optionen prüfen
              const corner1={id:uid(),x:last.x,y:first.y};
              const corner2={id:uid(),x:first.x,y:last.y};
              const d1=Math.hypot(corner1.x-last.x,corner1.y-last.y)+Math.hypot(corner1.x-first.x,corner1.y-first.y);
              const d2=Math.hypot(corner2.x-last.x,corner2.y-last.y)+Math.hypot(corner2.x-first.x,corner2.y-first.y);
              const corner=d1<=d2?corner1:corner2;
              finalPts=[...draft.pts,corner];
            }
            finalPts=simplifyClosedPts(finalPts);
            finalPts=simplifyClosedPts(finalPts);
            // v264: Konkave (Innen-)Ecken automatisch mit R8 versehen — typische Eckausbrüche
            // bekommen damit sofort eine gerundete Innenkante. Außenecken bleiben scharf.
            // Erkennung: Kreuzprodukt der Kantenvektoren. Bei "Kontur-im-Uhrzeigersinn" ist
            // ein negatives Kreuzprodukt = konkav (Innenknick), positiv = konvex (Außenecke).
            // Bei "gegen-Uhrzeigersinn" ist es umgekehrt — daher zuerst die Drehrichtung bestimmen.
            (function applyAutoR8(){
              const n=finalPts.length;
              if(n<4)return; // 3-Eck hat keine Innenecken
              // Signed area zur Drehrichtung
              let area2=0;
              for(let i=0;i<n;i++){
                const a=finalPts[i], b=finalPts[(i+1)%n];
                area2 += (a.x*b.y - b.x*a.y);
              }
              const ccw = area2>0; // counter-clockwise
              for(let i=0;i<n;i++){
                const prev=finalPts[(i-1+n)%n], cur=finalPts[i], nxt=finalPts[(i+1)%n];
                const ux=cur.x-prev.x, uy=cur.y-prev.y;
                const vx=nxt.x-cur.x, vy=nxt.y-cur.y;
                const cross = ux*vy - uy*vx;
                // Konkav wenn cross-Vorzeichen entgegengesetzt zur Drehrichtung
                const isConcave = ccw ? (cross<0) : (cross>0);
                if(isConcave && (cur.r==null || cur.r===0)){
                  cur.r = 8;
                }
              }
            })();
            pushHist();
            setPaths(p=>[...p,{id:uid(),pts:finalPts,closed:true,holes:[]}]);
            setDraft(null);setTool("select");setLenInput("");setNumPad({target:null,label:"",value:""});
            return;
          }
        }
        setDraft(d=>{var prev=d.pts[d.pts.length-1];var nx=wx,ny=wy;if(ortho&&prev){if(Math.abs(wx-prev.x)>=Math.abs(wy-prev.y)){ny=prev.y;}else{nx=prev.x;}}return{pts:[...d.pts,{id:uid(),x:nx,y:ny}]};});
      }
    } else if(tool==="ks"){
      pushHist();const nid=uid();
      // v245: Auto-Bindung an Zeichnung.
      // Wenn das KS in einer geschlossenen Form gesetzt wird → parentPathId merken.
      // Beim Verschieben/Skalieren der Zeichnung wandert das KS automatisch mit.
      // Wenn auf leerer Fläche gesetzt → parentPathId bleibt null (KS bleibt freischwebend).
      let parentPathId=null;
      for(let i=pathsRef.current.length-1;i>=0;i--){
        const p=pathsRef.current[i];
        if(p.closed && p.pts && pointInPoly(wx,wy,p.pts)){
          parentPathId=p.id;
          break;
        }
      }
      setKsList(p=>[...p,{id:nid,x:wx,y:wy,parentPathId:parentPathId}]);setActiveKS(nid);setTool("select");
    }
  };

  function applyNewLength(){
    if(!dialog||dialog.type!=="editlen")return;
    const newLenCad=parseFloat(String(dialog.newLen).replace(",","."));
    if(isNaN(newLenCad)||newLenCad<=0)return;
    const newLen=newLenCad*(pathCadScale(dialog.pathId)||1);
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==dialog.pathId)return p;
      const a=p.pts[dialog.segIdx];
      const b=p.pts[(dialog.segIdx+1)%p.pts.length];
      const dx=b.x-a.x,dy=b.y-a.y;
      const oldLen=Math.hypot(dx,dy);
      if(oldLen<0.001)return p;
      const factor=newLen/oldLen;
      const nbx=a.x+dx*factor,nby=a.y+dy*factor;
      const shiftX=nbx-b.x,shiftY=nby-b.y;
      // Verschiebe b und alle Punkte nach b mit
      const newPts=p.pts.map((pt,i)=>{
        if(i===(dialog.segIdx+1)%p.pts.length)return{...pt,x:nbx,y:nby};
        if(i>dialog.segIdx+1&&i<p.pts.length)return{...pt,x:pt.x+shiftX,y:pt.y+shiftY};
        return pt;
      });
      return{...p,pts:newPts};
    }));
    setDialog(null);
  }

  // v277: KS-Maße B + Höhe gemeinsam bearbeiten.
  // Beide Werte beziehen sich auf dieselbe Ecke und werden zusammen übernommen.
  function applyKsDim(){
    if(!dialog||dialog.type!=="editksdim")return;
    const newXCad=parseFloat(String(dialog.newX).replace(",","."));
    const newYCad=parseFloat(String(dialog.newY).replace(",","."));
    if(isNaN(newXCad)||isNaN(newYCad)||newXCad<0||newYCad<0)return;
    const path=pathsRef.current.find(p=>p.id===dialog.pathId);
    if(!path)return;
    const ks=ksList.find(k=>k.id===dialog.ksId);
    if(!ks)return;
    const newX=newXCad*(pathCadScale(dialog.pathId,"x")||1);
    const newY=newYCad*(pathCadScale(dialog.pathId,"y")||1);
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==dialog.pathId)return p;
      return {...p, pts:p.pts.map((pt,i)=>{
        if(i!==dialog.ptIdx)return pt;
        const signX = (pt.x>=ks.x) ? 1 : -1;
        const signY = (pt.y>=ks.y) ? 1 : -1;
        return {...pt,
          x:Math.round(ks.x + signX*newX),
          y:Math.round(ks.y + signY*newY)
        };
      })};
    }));
    setDialog(null);
  }


  function applyTotalDim(){
    if(!dialog||dialog.type!=="edittotaldim")return;
    const newLenCad=parseFloat(String(dialog.newLen).replace(",","."));
    if(isNaN(newLenCad)||newLenCad<=0)return;
    const path=pathsRef.current.find(p=>p.id===dialog.pathId);
    if(!path||!path.pts||path.pts.length<2)return;
    const b=pathBounds(path);
    const isWidth=dialog.axis==="x";
    const oldLen=isWidth?(b.right-b.left):(b.bottom-b.top);
    if(oldLen<=0.001)return;
    const targetLen=newLenCad*(pathCadScale(dialog.pathId)||1);
    const factor=targetLen/oldLen;
    const mapPt=(pt)=>isWidth?{...pt,x:Math.round(b.left+(pt.x-b.left)*factor)}:{...pt,y:Math.round(b.top+(pt.y-b.top)*factor)};
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==dialog.pathId)return p;
      return {...p,
        pts:p.pts.map(mapPt),
        holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>{
          if(h.type==="circle"){
            if(isWidth) return {...h,cx:Math.round(b.left+(h.cx-b.left)*factor)};
            return {...h,cy:Math.round(b.top+(h.cy-b.top)*factor)};
          }
          if(h.pts)return {...h,pts:h.pts.map(mapPt)};
          return h;
        })
      };
    }));
    setTexts(ts=>ts.map(t=>!textBelongsToPath(t,path)?t:(isWidth?{...t,parentPathId:path.id,x:Math.round(b.left+(t.x-b.left)*factor)}:{...t,parentPathId:path.id,y:Math.round(b.top+(t.y-b.top)*factor)})));
    setDialog(null);
  }

  function addPointFromValue(raw){
    if(!draft||!draft.pts.length)return false;
    const len=parseFloat(String(raw||"").replace(",","."));
    if(isNaN(len)||len<=0)return false;
    const lenMM=unit==="cm"?len*10:unit==="m"?len*1000:len;
    const prev=draft.pts[draft.pts.length-1];
    let nx=prev.x,ny=prev.y;
    if(lenDir==="right")nx=prev.x+lenMM;
    else if(lenDir==="left")nx=prev.x-lenMM;
    else if(lenDir==="down")ny=prev.y+lenMM;
    else if(lenDir==="up")ny=prev.y-lenMM;
    setDraft(d=>({pts:[...d.pts,{id:uid(),x:nx,y:ny}]}));
    setLenInput("");
    setNumPad(n=>({...n,value:""}));
    return true;
  }

  // ── Profi-Zahlenfeld rechts: ein zentrales Eingabesystem ohne Android-Tastatur ─────────────
  function setNumCursorFromTap(e){
    e.preventDefault();
    e.stopPropagation();
    const box=e.currentTarget.getBoundingClientRect();
    const v=String(numPad.value||"");
    const cx=(e.clientX!=null?e.clientX:(_optionalChain([e,'optionalAccess',_=>_.touches,'access',_=>_[0],'optionalAccess',_=>_.clientX])||box.right));
    const fs=18;
    const charW=fs*0.62; // system-ui ungefähr
    const padRight=10;
    const textRight=box.right-padRight;
    const textLeft=textRight-(v.length*charW);
    let pos=Math.round((cx-textLeft)/charW);
    pos=Math.max(0,Math.min(v.length,pos));
    setNumPad(n=>({...n,cursor:pos}));
  }

  function openNumPad(target,label,value){
    // v213: Zahlenfeld ohne Samsung-Tastatur.
    // Feld antippen -> Wert erscheint im Zahlenfeld + Fake-Cursor im Zahlenfeld.
    setNumPad(n=>{
      const cur=String(_nullishCoalesce(n.value, () => ("")));
      const start=(cur.trim()!=="" ? cur : String(_nullishCoalesce(value, () => (""))));
      return {target:target,label:label,value:start,cursor:start.length};

  function clearDialogFieldByTarget(target){
    if(!target || target.indexOf("dialog.")!==0)return;
    const field=target.split(".")[1];
    setDialog(d=>{
      if(!d)return d;
      // v142 C-FIX: C löscht den aktuell aktiven Wert direkt im Feld.
      // Radien und Maße werden auf 0 gesetzt; leere Eingabe ist danach sauber möglich.
      if(field==="radius"||field==="rAll"||field==="rTL"||field==="rTR"||field==="rBR"||field==="rBL") return {...d,[field]:0};
      if(field==="relX"||field==="relY"||field==="absX"||field==="absY"||field==="moveB"||field==="moveH"||field==="cutA"||field==="cutB"||field==="chLen"||field==="chAngle"||field==="slopeMM"||field==="newLen"||field==="newX"||field==="newY"||field==="breite"||field==="hoehe"||field==="durchmesser"||field==="bDiff"||field==="hDiff") return {...d,[field]:0};
      return {...d,[field]:""};
    });
  }
  function numKey(k){
    setNumPad(n=>{
      let v=String(n.value||"");
      let p=Number.isFinite(n.cursor)?Math.max(0,Math.min(v.length,n.cursor)):v.length;
      if(k==="C"){
        v=""; p=0;
        clearDialogFieldByTarget(n.target);
        if(n.target==="len") setLenInput("");
      }
      else if(k==="⌫"){
        if(p>0){ v=v.slice(0,p-1)+v.slice(p); p--; }
      }
      else if(k==="±"){
        if(v.startsWith("-")){ v=v.slice(1); p=Math.max(0,p-1); }
        else { v="-"+v; p++; }
      }
      else if(k===","||k==="."){
        if(!v.includes(",")&&!v.includes(".")){
          const ins = v ? "," : "0,";
          v=v.slice(0,p)+ins+v.slice(p); p+=ins.length;
        }
      } else {
        const ins=String(k);
        v=v.slice(0,p)+ins+v.slice(p); p+=ins.length;
      }
      return {...n,value:v,cursor:p};
    });
  }

  function defaultNumPadXY(){
    const padW=220, padH=330, gap=8, rightPanelW=240, rightPad=8, topBase=48;
    const maxX=Math.max(4, window.innerWidth-padW-4);
    const maxY=Math.max(4, window.innerHeight-padH-4);
    let x=Math.max(12, window.innerWidth-padW-24);
    let y=72;

    // v258: Dialoge rechts bekommen das Zahlenfeld nicht mehr oben im Weg.
    // Standard: schwebend unterhalb des rechten Fensters.

        x=window.innerWidth-rightPad-rightPanelW-gap-padW;

  function commitNumPad(){

    if(numPad.target==="len") {

  function restoreCornerCutsToOrig(pts){
    // v237 CAD-Basis:
    // Nur EIN Ausbruch pro Zeichnung. Bestehende Eckausbruch-Punktgruppen werden
    // zuerst zur Original-Ecke zurückgeführt, damit keine alten Restpunkte bleiben.
    if(!pts||!pts.length) return pts;
    const out=[];
    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      if(p.cornerCutId){
        const prev=out[out.length-1];
        const orig=p.cornerOrig?{id:uid(),x:Math.round(p.cornerOrig.x),y:Math.round(p.cornerOrig.y),r:0}:null;
        // ganze zusammenhängende cornerCutId-Gruppe überspringen
        const cid=p.cornerCutId;
        while(i+1<pts.length && pts[i+1].cornerCutId===cid) i++;
        if(orig && (!prev || !samePt(prev,orig))) out.push(orig);
      } else {
        out.push({...p});
      }
    }
    // falls Anfang/Ende gleiche Original-Ecke erzeugt wurde
    return simplifyClosedPts(out);
  }

  function confirmCornerCut(){
    if(!dialog||dialog.type!=="cornercut")return;

    let basePath=pathsRef.current.find(p=>p.id===dialog.pathId);
    if(!basePath||!basePath.closed||basePath.pts.length<3)return;

    // v237: Vor neuem Ausbruch alle bestehenden Ausbrüche sauber entfernen.
    const cleanPts=restoreCornerCutsToOrig(basePath.pts);
    const selectedOrig=dialog.cornerOrig || {x:dialog.absX,y:dialog.absY};

    // Richtigen Eckpunkt in der bereinigten Geometrie suchen
    let i=cleanPts.findIndex(p=>Math.abs(p.x-selectedOrig.x)<1 && Math.abs(p.y-selectedOrig.y)<1);
    if(i<0 && dialog.ptIdx!=null && dialog.ptIdx<cleanPts.length) i=dialog.ptIdx;
    if(i<0) return;

    const n=cleanPts.length;
    const prev=cleanPts[(i-1+n)%n],cur=cleanPts[i],next=cleanPts[(i+1)%n];
    const lenA=Math.hypot(prev.x-cur.x,prev.y-cur.y),lenB=Math.hypot(next.x-cur.x,next.y-cur.y);

    let a=Number(dialog.cutA),b=Number(dialog.cutB);

    a=Math.min(a,lenA-1); b=Math.min(b,lenB-1);

    const uA={x:(prev.x-cur.x)/lenA,y:(prev.y-cur.y)/lenA};
    const uB={x:(next.x-cur.x)/lenB,y:(next.y-cur.y)/lenB};

    const cutId=uid();
    const origCorner={x:cur.x,y:cur.y};
    const pA={id:uid(),x:Math.round(cur.x+uA.x*a),y:Math.round(cur.y+uA.y*a),r:0,cornerCutId:cutId,cornerOrig:origCorner,cutA:a,cutB:b};
    // v263: Innerer Knick (pI) bekommt standardmäßig Radius 8mm — die Ausbruchs-Innenecke wird gerundet.
    const pI={id:uid(),x:Math.round(cur.x+uA.x*a+uB.x*b),y:Math.round(cur.y+uA.y*a+uB.y*b),r:8,cornerCutId:cutId,cornerOrig:origCorner,cutA:a,cutB:b};
    const pB={id:uid(),x:Math.round(cur.x+uB.x*b),y:Math.round(cur.y+uB.y*b),r:0,cornerCutId:cutId,cornerOrig:origCorner,cutA:a,cutB:b};

    const pts=cleanPts.slice();
    pts.splice(i,1,pA,pI,pB);

    pushHist();

      if(p.id!==dialog.pathId)return p;

        ...p,
        pts:simplifyClosedPts(pts),

          cutB:b
        }
      };
    }));

  }

  function openChamferFromPt(){

    // v146: Wenn der gewählte Punkt schon zu einem Eckausbruch/Radius gehört,
    // wird dieser zuerst logisch zur Original-Ecke zurückgeführt und danach
    // direkt als Schräge/Winkel neu bearbeitet.
    if(dialog.cornerCutId){
      const cornerCutId=dialog.cornerCutId;
      const n0=pts.length;
      let start=-1,count=0;
      for(let k=0;k<n0;k++){
        if(pts[k].cornerCutId===cornerCutId && pts[(k+1)%n0].cornerCutId===cornerCutId && pts[(k+2)%n0].cornerCutId===cornerCutId){start=k;count=3;break;}

      }

        const restored={id:uid(),x:Math.round(inter.x),y:Math.round(inter.y),r:0};
        const out=[];
        for(let k=0;k<n0;k++){
          if(k===start){out.push(restored); k+=count-1;}
          else out.push(pts[k]);
        }
        pts=simplifyClosedPts(out);
        i=Math.max(0,Math.min(start,pts.length-1));

        setPaths(ps=>ps.map(p=>p.id!==path.id?p:{...p,pts:pts}));

    const n=path.pts.length,i=dialog.ptIdx;
    const prev=path.pts[(i-1+n)%n],cur=path.pts[i],next=path.pts[(i+1)%n];
    const lenA=Math.hypot(prev.x-cur.x,prev.y-cur.y),lenB=Math.hypot(next.x-cur.x,next.y-cur.y);
    let a=0,b=0;
    const mode=dialog.chamferMode||"ab";
    if(mode==="len45"){
      const L=Number(dialog.chLen);
      if(!L||L<=0){alert("Bitte Länge eingeben.");return;}
      a=L; b=L;
    } else if(mode==="lenAngle"){
      const L=Number(dialog.chLen), ang=Number(dialog.chAngle);
      if(!L||L<=0){alert("Bitte Länge eingeben.");return;}
      if(isNaN(ang)||ang<0||ang>90){alert("Bitte Winkel 0–90° eingeben.");return;}
      const rad=ang*Math.PI/180;
      a=Math.cos(rad)*L;
      b=Math.sin(rad)*L;
      if(b<1)b=1;
    } else {
      a=Number(dialog.cutA); b=Number(dialog.cutB);
      if(!a||!b||a<=0||b<=0){alert("Bitte beide Schenkel eingeben.");return;}
    }
    a=Math.min(a,lenA-1); b=Math.min(b,lenB-1);
    const uA={x:(prev.x-cur.x)/lenA,y:(prev.y-cur.y)/lenA};
    const uB={x:(next.x-cur.x)/lenB,y:(next.y-cur.y)/lenB};
    const cutId=uid();
    const origCorner={x:cur.x,y:cur.y};
    const pA={id:uid(),x:Math.round(cur.x+uA.x*a),y:Math.round(cur.y+uA.y*a),r:0,cornerCutId:cutId,cornerOrig:origCorner,cornerKind:"chamfer"};
    const pB={id:uid(),x:Math.round(cur.x+uB.x*b),y:Math.round(cur.y+uB.y*b),r:0,cornerCutId:cutId,cornerOrig:origCorner,cornerKind:"chamfer"};
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==dialog.pathId)return p;
      const pts=p.pts.slice();
      pts.splice(i,1,pA,pB);
      return {...p,pts:simplifyClosedPts(pts)};
    }));
    setDialog(null);setSel(null);
  }

  function lineIntersection(a,b,c,d){
    const x1=a.x,y1=a.y,x2=b.x,y2=b.y,x3=c.x,y3=c.y,x4=d.x,y4=d.y;
    const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
    if(Math.abs(den)<0.0001)return null;
    const px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
    const py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;
    return {x:Math.round(px),y:Math.round(py)};
  }

function deleteCornerCut(pathId,cornerCutId){
    if(!pathId||!cornerCutId)return;
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==pathId)return p;
      const pts=p.pts.map(pt=>({...pt}));
      const n=pts.length;
      let start=-1, count=0;
      for(let i=0;i<n;i++){
        if(pts[i].cornerCutId===cornerCutId && pts[(i+1)%n].cornerCutId===cornerCutId && pts[(i+2)%n].cornerCutId===cornerCutId){start=i;count=3;break;}
        if(pts[i].cornerCutId===cornerCutId && pts[(i+1)%n].cornerCutId===cornerCutId){start=i;count=2;break;}
      }
      if(start<0){return p;}
      const before=pts[(start-1+n)%n];
      const pA=pts[start];
      const pB=pts[(start+count-1)%n];
      const after=pts[(start+count)%n];
      const mid=count===3?pts[(start+1)%n]:null;
      // Original-Ecke exakt zurücksetzen; Fallback: Schnittpunkt der verlängerten Aussenkanten.
      const orig=pA.cornerOrig||(mid&&mid.cornerOrig)||pB.cornerOrig;
      const inter=orig || lineIntersection(before,pA,pB,after) || {x:pA.x,y:pB.y};
      const restored={id:uid(),x:Math.round(inter.x),y:Math.round(inter.y),r:0};
      let out=[];
      for(let k=0;k<n;k++){
        if(k===start){out.push(restored); k+=count-1;}
        else out.push(pts[k]);
      }
      return {...p,pts:simplifyClosedPts(out)};
    }));
    setDialog(null);setSel(null);
  }

      return {x:hole.pts.reduce((s,p)=>s+p.x,0)/hole.pts.length,y:hole.pts.reduce((s,p)=>s+p.y,0)/hole.pts.length};
    }
    return {x:0,y:0};

      if(last.pts.length>2)setPaths(ps=>ps.map((p,i)=>i===ps.length-1?{...p,pts:p.pts.slice(0,-1),closed:false}:p));
      else setPaths(p=>p.slice(0,-1));
      return;
    }
    if(ksList.length>1){const nl=ksList.slice(0,-1);setKsList(nl);setActiveKS(nl[nl.length-1].id);}
    setSel(null);
  }

  function fitAllDrawing(){
    const xs=[], ys=[];
    const addPt=(pt)=>{ if(!pt)return; xs.push(Number(pt.x)||0); ys.push(Number(pt.y)||0); };
    pathsRef.current.forEach(p=>{
      (p.pts||[]).forEach(addPt);
      (_nullishCoalesce(p.holes, () => ([]))).forEach(h=>{
        if(h.type==="circle"){ xs.push(h.cx-h.r,h.cx+h.r); ys.push(h.cy-h.r,h.cy+h.r); }
        else if(h.pts) h.pts.forEach(addPt);
      });
    });
    if(draft && draft.pts) draft.pts.forEach(addPt);
    textsRef.current.forEach(t=>{
      const b=approxTextBox(t);
      xs.push(t.x, t.x+b.width);
      ys.push(t.y, t.y-b.height);
    });
    if(!xs.length || !svgRef.current){ setZoom(1); setPan({x:260,y:220}); return; }

    let minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const r=svgRef.current.getBoundingClientRect();

    // v165 Auto-Ansicht komplett:
    // Ansicht reset soll die ganze Zeichnung inklusive Kettenmasse sichtbar machen.
    // Darum extra Welt-Rand fuer Masslinien/Labels und kein Massstab-Zoom-Faktor.
    const bw0=Math.max(1,maxX-minX), bh0=Math.max(1,maxY-minY);
    const worldPad=Math.max(520, Math.max(bw0,bh0)*0.14);
    minX-=worldPad; maxX+=worldPad; minY-=worldPad; maxY+=worldPad;

    const bottomReserve=132;
    const rightReserve=(dialog?260:0);
    const leftPad=44, topPad=44, rightPad=44+rightReserve, bottomPad=44+bottomReserve;
    const viewW=Math.max(120,r.width-leftPad-rightPad);
    const viewH=Math.max(120,r.height-topPad-bottomPad);

    const bw=Math.max(1,maxX-minX), bh=Math.max(1,maxY-minY);
    const z=Math.min(8,Math.max(0.02,Math.min(viewW/bw,viewH/bh)));

    const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
    const screenCx=leftPad+viewW/2;
    const screenCy=topPad+viewH/2;
    setZoom(z);
    setPan({x:screenCx-cx*z,y:screenCy-cy*z});
  }

    function cleanColor(v){ return String(v||"").trim().toLowerCase(); }
    function isGridOrUi(el){
      const stroke=cleanColor(el.getAttribute("stroke")||el.style.stroke);
      const fill=cleanColor(el.getAttribute("fill")||el.style.fill);
      const tag=(el.tagName||"").toLowerCase();
      if(stroke==="#e8ecf1"||stroke==="#c8d0dc"||stroke==="#d9e0ea"||stroke==="#eef2f7"||stroke==="#b0b8c8") return true;
      if(tag==="rect" && (fill==="#ffffff"||fill==="white") && !stroke) return true;
      return false;
    }

    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;

  function makePdfFromJpeg(dataUrl,wPx,hPx){
    const pageW=841.89, pageH=595.28; // A4 quer in pt
    const b64=dataUrl.split(",")[1];
    const bin=atob(b64);
    const imgBytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) imgBytes[i]=bin.charCodeAt(i);

    const enc=new TextEncoder();
    const parts=[]; const offsets=[];
    let pos=0;
    function add(s){ const u=(typeof s==="string")?enc.encode(s):s; parts.push(u); pos+=u.length; }
    function obj(n,s){ offsets[n]=pos; add(n+" 0 obj\n"+s+"\nendobj\n"); }

    add("%PDF-1.4\n");
    obj(1,"<< /Type /Catalog /Pages 2 0 R >>");
    obj(2,"<< /Type /Pages /Kids [3 0 R] /Count 1 >>");
    obj(3,"<< /Type /Page /Parent 2 0 R /MediaBox [0 0 "+pageW+" "+pageH+"] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>");
    offsets[4]=pos;
    add("4 0 obj\n<< /Type /XObject /Subtype /Image /Width "+wPx+" /Height "+hPx+" /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length "+imgBytes.length+" >>\nstream\n");
    add(imgBytes); add("\nendstream\nendobj\n");
    const content="q "+pageW+" 0 0 "+pageH+" 0 0 cm /Im0 Do Q\n";
    obj(5,"<< /Length "+content.length+" >>\nstream\n"+content+"endstream");
    const xref=pos;
    add("xref\n0 6\n0000000000 65535 f \n");
    for(let i=1;i<=5;i++) add(String(offsets[i]).padStart(10,"0")+" 00000 n \n");
    add("trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n"+xref+"\n%%EOF");

    const blob=new Blob(parts,{type:"application/pdf"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const name=(titleBlock.projekt||"EspoMass_Zeichnung").replace(/[^a-zA-Z0-9äöüÄÖÜ_-]/g,"_");
    a.href=url; a.download=name+".pdf";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }


  function exportDXF(){
    let dxf = "";

    // HEADER
    dxf += "0\nSECTION\n2\nHEADER\n";
    dxf += "9\n$ACADVER\n1\nAC1009\n";
    dxf += "9\n$INSUNITS\n70\n4\n"; // 4 = mm
    dxf += "0\nENDSEC\n";

    // TABLES
    dxf += "0\nSECTION\n2\nTABLES\n";
    dxf += "0\nTABLE\n2\nLAYER\n70\n3\n";
    dxf += "0\nLAYER\n2\n0\n70\n0\n62\n7\n6\nCONTINUOUS\n";

    dxf += "0\nENDTAB\n";
    dxf += "0\nENDSEC\n";

    // ENTITIES
    dxf += "0\nSECTION\n2\nENTITIES\n";

    // TEST v69: einfache visuelle Masslinien im DXF (LINE + TEXT auf Layer MASSE)
    function dxfLineEnt(x1,y1,x2,y2,layer){
      layer = layer || "MASSE";
      return "0\nLINE\n8\n"+layer+"\n10\n"+x1.toFixed(4)+"\n20\n"+(-y1).toFixed(4)+"\n30\n0\n11\n"+x2.toFixed(4)+"\n21\n"+(-y2).toFixed(4)+"\n31\n0\n";
    }
    function dxfTextEnt(x,y,text,height,rot,layer){
      layer = layer || "MASSE";
      height = height || 28;
      rot = rot || 0;
      return "0\nTEXT\n8\n"+layer+"\n10\n"+x.toFixed(4)+"\n20\n"+(-y).toFixed(4)+"\n30\n0\n40\n"+height+"\n1\n"+String(text)+"\n50\n"+rot+"\n72\n1\n73\n2\n11\n"+x.toFixed(4)+"\n21\n"+(-y).toFixed(4)+"\n31\n0\n";
    }
    function centerPtsDXF(pts){
      return {x:pts.reduce((a,p)=>a+p.x,0)/pts.length,y:pts.reduce((a,p)=>a+p.y,0)/pts.length};
    }
    function dimSideDXF(a,b,c){
      const horizontal = Math.abs(a.y-b.y) <= Math.abs(a.x-b.x);
      if(horizontal) return a.y < c.y ? "top" : "bottom";
      return a.x < c.x ? "left" : "right";
    }
    function dimLineOutsideDXF(a,b,c,index){
      const side = dimSideDXF(a,b,c);
      const base = 90, step = 35;
      const off = base + (index||0)*step;
      if(side === "top" || side === "bottom"){
        const dir = side === "top" ? -1 : 1;
        return {p1:{x:a.x,y:a.y+dir*off},p2:{x:b.x,y:b.y+dir*off},side};
      }
      const dir = side === "left" ? -1 : 1;
      return {p1:{x:a.x+dir*off,y:a.y},p2:{x:b.x+dir*off,y:b.y},side};
    }
    function addDimsForPolylineDXF(pts,closed,cadScale){
      if(!pts || pts.length<2) return;
      const c = centerPtsDXF(pts);
      const counts={top:0,bottom:0,left:0,right:0};
      const n = closed ? pts.length : pts.length-1;
      for(let i=0;i<n;i++){
        const a=pts[i], b=pts[(i+1)%pts.length];
        const side = dimSideDXF(a,b,c);
        const dim = dimLineOutsideDXF(a,b,c,counts[side]++);
        dxf += dxfLineEnt(a.x,a.y,dim.p1.x,dim.p1.y,"MASSE");
        dxf += dxfLineEnt(b.x,b.y,dim.p2.x,dim.p2.y,"MASSE");
        dxf += dxfLineEnt(dim.p1.x,dim.p1.y,dim.p2.x,dim.p2.y,"MASSE");
        const mx=(dim.p1.x+dim.p2.x)/2, my=(dim.p1.y+dim.p2.y)/2;
        const rot=(side==="left"||side==="right")?90:0;
        dxf += dxfTextEnt(mx,my,String(Math.round(mmLen(a,b)/(cadScale||1))),28,rot,"MASSE");
      }
    }

    paths.forEach(path => {
      if(path.pts.length < 2) return;

      // Hauptpfad als POLYLINE
      dxf += "0\nPOLYLINE\n";
      dxf += "8\n0\n";       // layer
      dxf += "66\n1\n";      // vertices follow
      dxf += `70\n${path.closed ? 1 : 0}\n`; // closed
      dxf += "10\n0.0\n20\n0.0\n30\n0.0\n";

      path.pts.forEach(p => {
        dxf += "0\nVERTEX\n";
        dxf += "8\n0\n";
        dxf += `10\n${p.x.toFixed(4)}\n`;
        dxf += `20\n${(-p.y).toFixed(4)}\n`;
        dxf += "30\n0.0\n";
      });
      dxf += "0\nSEQEND\n8\n0\n";

      // Löcher
      (_nullishCoalesce(path.holes, () => ( []))).forEach(hole => {
        if(hole.type === "circle"){
          dxf += "0\nCIRCLE\n";
          dxf += "8\nLOECHER\n";
          dxf += `10\n${hole.cx.toFixed(4)}\n`;
          dxf += `20\n${(-hole.cy).toFixed(4)}\n`;
          dxf += "30\n0.0\n";
          dxf += `40\n${hole.r.toFixed(4)}\n`;
          dxf += dxfTextEnt(hole.cx, hole.cy - hole.r - 55, "Ø" + Math.round((hole.r*2)/(path.cadScale||1)), 28, 0, "MASSE");
        } else if(hole.pts && hole.pts.length >= 2){
          dxf += "0\nPOLYLINE\n";
          dxf += "8\nLOECHER\n";
          dxf += "66\n1\n70\n1\n";
          dxf += "10\n0.0\n20\n0.0\n30\n0.0\n";
          hole.pts.forEach(p => {
            dxf += "0\nVERTEX\n8\nLOECHER\n";
            dxf += `10\n${p.x.toFixed(4)}\n`;
            dxf += `20\n${(-p.y).toFixed(4)}\n`;
            dxf += "30\n0.0\n";
          });
          dxf += "0\nSEQEND\n8\nLOECHER\n";
          addDimsForPolylineDXF(hole.pts,true,path.cadScale||1);
        }
      });

      // TEST v69: Aussen-Masslinien für Hauptkontur
      addDimsForPolylineDXF(path.pts,path.closed,path.cadScale||1);
    });

    // Freie Texte
    texts.forEach(t => {
      dxf += dxfTextEnt(t.x, t.y, t.text, Math.max(18, t.size||26), 0, "TEXT");
    });

    // v239 Winkel-Maße als Text auf Layer MASSE
    angles.forEach(a => {
      dxf += dxfTextEnt(a.vx + 80, a.vy - 30, a.deg + " Grad", 32, 0, "MASSE");
    });

    // KS als POINT
    ksList.forEach((ks, i) => {
      if(ks.hidden)return; // v248: ausgeblendete KS nicht exportieren
      dxf += "0\nPOINT\n";
      dxf += "8\n0\n";
      dxf += `10\n${ks.x.toFixed(4)}\n`;
      dxf += `20\n${(-ks.y).toFixed(4)}\n`;
      dxf += "30\n0.0\n";
    });

    dxf += "0\nENDSEC\n0\nEOF\n";

    const uri = "data:application/dxf;charset=utf-8," + encodeURIComponent(dxf);
    const a = document.createElement("a");
    a.setAttribute("href", uri);
    a.setAttribute("download", "zeichnung_mit_masslinien_TEST.dxf");
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Segment labels / CAD-Aussenmasslinien v73 TEST ─────────────────────
  // Maßlinien werden NICHT gespeichert. Sie werden bei jedem Rendern
  // direkt aus den aktuellen path.pts berechnet. Wenn sich ein Maß/Punkt ändert,
  // wandern Linie und Text automatisch mit der neuen Geometrie.
  function segLabels(pts,closed,col,pathId){
    // v251: Mass und Schräge sind jetzt UNABHÄNGIG.
    // - showDim=true → normale Maße sichtbar
    // - showDiagonalDims=true → Schräg-Maße sichtbar (unabhängig von showDim)
    // - beide false → keine Maße
    if((!showDim && !showDiagonalDims) || (dialog&&dialog.type==="chamfer"))return null;
    if(!pts||pts.length<2)return null;

    // Offene Draft-Linien weiter schlicht beschriften, damit Zeichnen schnell bleibt.
    if(!closed){
      const n=pts.length-1;
      return Array.from({length:n},(_,i)=>{
        const a=pts[i],b=pts[i+1];
        const sa=w2s(a.x,a.y,pan,zoom),sb=w2s(b.x,b.y,pan,zoom);
        const mx=(sa.x+sb.x)/2,my=(sa.y+sb.y)/2,len=cadLenBetween(a,b,pathId);
        const dx=sb.x-sa.x,dy=sb.y-sa.y,dl=Math.hypot(dx,dy)||1;
        // v188: Beim Punktsetzen darf die Maßzahl nicht auf der Linie liegen.
        const ox=-dy/dl*12, oy=dx/dl*12;
        return React.createElement('g',{key:"sl"+i,style:{pointerEvents:"none"}},
          React.createElement('text',{x:mx+ox,y:my+oy+5,textAnchor:"middle",fontSize:12,fontWeight:"900",fill:col,stroke:"#fff",strokeWidth:7,paintOrder:"stroke"},fmt(len))
        );
      });
    }

    // v74 TEST: Maßlinien werden bei jedem Rendern aus den aktuellen Punkten berechnet.
    // Wichtig: NICHT mehr nur horizontale/vertikale Segmente. Auch wenn beim Ändern einer
    // Länge eine Kante schräg wird, bleibt die Maßlinie sichtbar und folgt dem neuen Segment.
    // v86 TEST: Maßlinienabstand in Bildschirm-Pixeln statt fixen mm.
    // Dadurch sieht die Staffelung bei jedem Zoom sauber aus.
    const BASE_DIM_PX=28;
    const STEP_DIM_PX=48;
    const OFFSET=110; // Legacy-Fallback für alte Helfer
    const n=pts.length;

    function outsideNormal(a,b){
      const dx=b.x-a.x,dy=b.y-a.y;
      const len=Math.hypot(dx,dy)||1;
      let nx=-dy/len, ny=dx/len;
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      // Testpunkt auf Kandidatenseite: liegt er im Polygon, dann zeigt die Normale nach innen → umdrehen.
      if(pointInPoly(mx+nx*5,my+ny*5,pts)){ nx=-nx; ny=-ny; }
      return {x:nx,y:ny};
    }
    function dimWorld(a,b){
      const no=outsideNormal(a,b);
      return {
        a:{x:a.x+no.x*OFFSET,y:a.y+no.y*OFFSET},
        b:{x:b.x+no.x*OFFSET,y:b.y+no.y*OFFSET},
        n:no
      };
    }
    // v82 TEST: Maßlinien ohne Pfeile – Variante B mit kurzen Endstrichen.
    function tickPoints(a,b){
      const sz=7;
      const dx=b.x-a.x,dy=b.y-a.y;
      const len=Math.hypot(dx,dy)||1;
      const px=-dy/len,py=dx/len;
      return {
        a1:{x:a.x+px*sz,y:a.y+py*sz},
        a2:{x:a.x-px*sz,y:a.y-py*sz},
        b1:{x:b.x+px*sz,y:b.y+py*sz},
        b2:{x:b.x-px*sz,y:b.y-py*sz}
      };
    }
    function readableAngle(a,b){
      let ang=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;
      // Text nie auf dem Kopf darstellen.
      if(ang>90) ang-=180;
      if(ang<-90) ang+=180;
      return ang;
    }

    function compactCornerCutDim(i,a,b){
      // v83 TEST: Eckausbruch-Maße Variante C.
      // Automatisch nach außen versetzt, mit dynamischem Abstand und zusätzlichem Text-Freiraum.
      const no=outsideNormal(a,b);
      const lenW=Math.hypot(b.x-a.x,b.y-a.y)||1;
      const baseOffset=Math.max(70,Math.min(135,lenW*0.32));
      const txt="Δ "+fmt(cadLenBetween(a,b,pathId));
      const textClear=Math.min(45,Math.max(20,String(txt).length*4));
      const off=baseOffset+textClear;
      const wa={x:a.x+no.x*off,y:a.y+no.y*off};
      const wb={x:b.x+no.x*off,y:b.y+no.y*off};
      const sa=w2s(wa.x,wa.y,pan,zoom);
      const sb=w2s(wb.x,wb.y,pan,zoom);
      const ea=w2s(a.x,a.y,pan,zoom);
      const eb=w2s(b.x,b.y,pan,zoom);
      const mx=(sa.x+sb.x)/2,my=(sa.y+sb.y)/2;
      const tw=String(txt).length*7+22;
      const labelGap=12;
      const ea2=w2s(wa.x,wa.y,pan,zoom), eb2=w2s(wb.x,wb.y,pan,zoom);
      const nxp=(ea2.x+eb2.x)/2-mx, nyp=(ea2.y+eb2.y)/2-my;
      const nl=Math.hypot(nxp,nyp)||1;
      const tx=mx+(nxp/nl)*labelGap, ty=my+(nyp/nl)*labelGap;
      const ang=readableAngle(sa,sb);
      const rot="rotate("+ang+" "+tx+" "+ty+")";
      const tk=tickPoints(sa,sb);
      return React.createElement("g",{key:"cornerCutDimC"+i+"_"+a.x+"_"+a.y+"_"+b.x+"_"+b.y,style:{pointerEvents:"none"}},
        React.createElement("line",{x1:ea.x,y1:ea.y,x2:sa.x,y2:sa.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.7}),
        React.createElement("line",{x1:eb.x,y1:eb.y,x2:sb.x,y2:sb.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.7}),
        React.createElement("line",{x1:sa.x,y1:sa.y,x2:sb.x,y2:sb.y,stroke:col,strokeWidth:1.7}),
        React.createElement("line",{x1:tk.a1.x,y1:tk.a1.y,x2:tk.a2.x,y2:tk.a2.y,stroke:col,strokeWidth:1.9}),
        React.createElement("line",{x1:tk.b1.x,y1:tk.b1.y,x2:tk.b2.x,y2:tk.b2.y,stroke:col,strokeWidth:1.9}),
        React.createElement("text",{x:tx,y:ty+5,textAnchor:"middle",fontSize:12,fontWeight:"900",fill:col,stroke:"#fff",strokeWidth:7,paintOrder:"stroke",transform:rot},txt)
      );
    }

    // v85 FIX: Profi-Maßlinien. Eckausbruch-Maße werden pro Richtung gesammelt,
    // lang → kurz sortiert und gestaffelt (außen), damit sie nicht übereinander liegen.
    function renderOneDim(key,a,b,extraOffset,strokeW){
      const no=outsideNormal(a,b);
      const off=(BASE_DIM_PX+(_nullishCoalesce(extraOffset, () => (0)))/zoom);
      const wa={x:a.x+no.x*off,y:a.y+no.y*off};
      const wb={x:b.x+no.x*off,y:b.y+no.y*off};
      const sa=w2s(a.x,a.y,pan,zoom),sb=w2s(b.x,b.y,pan,zoom);
      const da=w2s(wa.x,wa.y,pan,zoom),db=w2s(wb.x,wb.y,pan,zoom);
      const mx=(da.x+db.x)/2,my=(da.y+db.y)/2,len=cadLenBetween(a,b,pathId);
      const tk=tickPoints(da,db);
      const txt=((a.cornerCutId&&b.cornerCutId&&a.cornerCutId===b.cornerCutId)?"Δ ":"")+fmt(len);
      const tw=String(txt).length*7+18;
      const labelGap=12;
      const ns=w2s(wa.x,wa.y,pan,zoom), nb=w2s(wb.x,wb.y,pan,zoom);
      const nxp=(ns.x+nb.x)/2-mx, nyp=(ns.y+nb.y)/2-my;
      const nl=Math.hypot(nxp,nyp)||1;
      const tx=mx+(nxp/nl)*labelGap, ty=my+(nyp/nl)*labelGap;
      const ang=readableAngle(da,db);
      const rot="rotate("+ang+" "+tx+" "+ty+")";
      return React.createElement('g',{key:key,style:{pointerEvents:"none"}},
        React.createElement('line',{x1:sa.x,y1:sa.y,x2:da.x,y2:da.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.78}),
        React.createElement('line',{x1:sb.x,y1:sb.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.78}),
        React.createElement('line',{x1:da.x,y1:da.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:_nullishCoalesce(strokeW, () => (1.7))}),
        React.createElement('line',{x1:tk.a1.x,y1:tk.a1.y,x2:tk.a2.x,y2:tk.a2.y,stroke:col,strokeWidth:1.8}),
        React.createElement('line',{x1:tk.b1.x,y1:tk.b1.y,x2:tk.b2.x,y2:tk.b2.y,stroke:col,strokeWidth:1.8}),
        React.createElement('text',{x:tx,y:ty+5,textAnchor:"middle",fontSize:12,fontWeight:"900",fill:col,stroke:"#fff",strokeWidth:7,paintOrder:"stroke",transform:rot},txt)
      );
    }
    function sideKey(a,b){
      const no=outsideNormal(a,b);
      const horiz=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
      if(horiz) return no.y<0?"top":"bottom";
      return no.x<0?"left":"right";
    }

    function cutSideFromCorner(a,b){
      // v236 RICHTIG FIX:
      // Ausbruch-Seite wird aus der ORIGINAL-Ecke bestimmt, nicht aus der Segment-Normale.
      const orig=a.cornerOrig||b.cornerOrig||null;
      if(!orig) return sideKey(a,b);

      const dx=Math.abs(b.x-a.x);
      const dy=Math.abs(b.y-a.y);

      if(dx>=dy){
        return Math.abs(orig.y-minY)<=Math.abs(orig.y-maxY) ? "top" : "bottom";
      } else {
        return Math.abs(orig.x-minX)<=Math.abs(orig.x-maxX) ? "left" : "right";
      }
    }
    const normalDims=[];
    const cutDims=[];
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    pts.forEach(p=>{minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);});
    for(let i=0;i<n;i++){
      const a=pts[i],b=pts[(i+1)%pts.length];
      const isCut=(a.cornerCutId && b.cornerCutId && a.cornerCutId===b.cornerCutId);
      const item={
        i,a,b,
        len:cadLenBetween(a,b,pathId),
        side:isCut?cutSideFromCorner(a,b):sideKey(a,b),
        pathId:pathId,
        segIdx:i,
        isCut:isCut
      };
      if(item.isCut) cutDims.push(item);
      else normalDims.push(item);
    }
    const els=[];

    // v86 FIX: Globale Außenmaßlinien pro Seite.
    // Oben über minY, unten unter maxY, links von minX, rechts von maxX.
    // Längste Maßlinie liegt außen, kürzere innen. Endstriche statt Pfeile.
    function renderGlobalDim(key,d,side,rank,count,strokeW){
      const outerPx=BASE_DIM_PX+STEP_DIM_PX*(count-rank-1);
      const offW=outerPx/zoom;
      let wa,wb;
      if(side==="top"){
        const y=minY-offW;
        wa={x:d.a.x,y}; wb={x:d.b.x,y};
      } else if(side==="bottom"){
        const y=maxY+offW;
        wa={x:d.a.x,y}; wb={x:d.b.x,y};
      } else if(side==="left"){
        const x=minX-offW;
        wa={x,y:d.a.y}; wb={x,y:d.b.y};
      } else {
        const x=maxX+offW;
        wa={x,y:d.a.y}; wb={x,y:d.b.y};
      }

      const sa=w2s(d.a.x,d.a.y,pan,zoom), sb=w2s(d.b.x,d.b.y,pan,zoom);
      const da=w2s(wa.x,wa.y,pan,zoom), db=w2s(wb.x,wb.y,pan,zoom);
      const mx=(da.x+db.x)/2,my=(da.y+db.y)/2;
      const tk=tickPoints(da,db);
      const txt=fmt(d.len);
      const tw=String(txt).length*7+18;
      const labelGap=12;
      const tx=side==="left"?mx-labelGap:(side==="right"?mx+labelGap:mx);
      const ty=side==="top"?my-labelGap:(side==="bottom"?my+labelGap:my);
      const ang=readableAngle(da,db);
      const rot="rotate("+ang+" "+tx+" "+ty+")";
      return React.createElement('g',{key:key,style:{pointerEvents:"none"}},
        React.createElement('line',{x1:sa.x,y1:sa.y,x2:da.x,y2:da.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.78}),
        React.createElement('line',{x1:sb.x,y1:sb.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:.78}),
        React.createElement('line',{x1:da.x,y1:da.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:_nullishCoalesce(strokeW, () => (1.7))}),
        React.createElement('line',{x1:tk.a1.x,y1:tk.a1.y,x2:tk.a2.x,y2:tk.a2.y,stroke:col,strokeWidth:1.8}),
        React.createElement('line',{x1:tk.b1.x,y1:tk.b1.y,x2:tk.b2.x,y2:tk.b2.y,stroke:col,strokeWidth:1.8}),
        React.createElement('text',{x:tx,y:ty+5,textAnchor:"middle",fontSize:12,fontWeight:"900",fill:col,stroke:"#fff",strokeWidth:7,paintOrder:"stroke",transform:rot},txt)
      );
    }

    function cadXForVisualX(x){
      const hits=pts.filter(p=>Math.abs(p.x-x)<2);
      if(hits.length)return hits.reduce((s,p)=>s+cadXOf(p),0)/hits.length;
      if(Math.abs(x-minX)<2)return Math.min(...pts.map(cadXOf));
      if(Math.abs(x-maxX)<2)return Math.max(...pts.map(cadXOf));
      return cadLen(x-minX,pathId,"x") + Math.min(...pts.map(cadXOf));
    }
    function cadYForVisualY(y){
      const hits=pts.filter(p=>Math.abs(p.y-y)<2);
      if(hits.length)return hits.reduce((s,p)=>s+cadYOf(p),0)/hits.length;
      if(Math.abs(y-minY)<2)return Math.min(...pts.map(cadYOf));
      if(Math.abs(y-maxY)<2)return Math.max(...pts.map(cadYOf));
      return cadLen(y-minY,pathId,"y") + Math.min(...pts.map(cadYOf));
    }
    function totalDimForSide(side){
      const minCadX=Math.min(...pts.map(cadXOf)), maxCadX=Math.max(...pts.map(cadXOf));
      const minCadY=Math.min(...pts.map(cadYOf)), maxCadY=Math.max(...pts.map(cadYOf));
      if(side==="top") return {i:"gesamt",a:{x:minX,y:minY},b:{x:maxX,y:minY},len:cleanNum(Math.abs(maxCadX-minCadX),2),side,total:true,pathId:pathId,axis:"x"};
      if(side==="bottom") return {i:"gesamt",a:{x:minX,y:maxY},b:{x:maxX,y:maxY},len:cleanNum(Math.abs(maxCadX-minCadX),2),side,total:true,pathId:pathId,axis:"x"};
      if(side==="left") return {i:"gesamt",a:{x:minX,y:minY},b:{x:minX,y:maxY},len:cleanNum(Math.abs(maxCadY-minCadY),2),side,total:true,pathId:pathId,axis:"y"};
      return {i:"gesamt",a:{x:maxX,y:minY},b:{x:maxX,y:maxY},len:cleanNum(Math.abs(maxCadY-minCadY),2),side,total:true,pathId:pathId,axis:"y"};
    }

    function nearlySameDim(a,b){
      if(!a||!b)return false;
      const ah=Math.abs(a.b.x-a.a.x)>=Math.abs(a.b.y-a.a.y);
      const bh=Math.abs(b.b.x-b.a.x)>=Math.abs(b.b.y-b.a.y);
      if(ah!==bh)return false;
      if(Math.abs(a.len-b.len)>1)return false;
      if(ah){
        const ax1=Math.min(a.a.x,a.b.x), ax2=Math.max(a.a.x,a.b.x);
        const bx1=Math.min(b.a.x,b.b.x), bx2=Math.max(b.a.x,b.b.x);
        return Math.abs(ax1-bx1)<1 && Math.abs(ax2-bx2)<1;
      }
      const ay1=Math.min(a.a.y,a.b.y), ay2=Math.max(a.a.y,a.b.y);
      const by1=Math.min(b.a.y,b.b.y), by2=Math.max(b.a.y,b.b.y);
      return Math.abs(ay1-by1)<1 && Math.abs(ay2-by2)<1;
    }

    // v88: DIN-Maßketten. Pro Seite wird eine Teilmaß-Kette gezeichnet.
    // Das Gesamtmaß liegt immer am weitesten außen.
    function renderDimAtOuterPx(key,d,side,outerPx,strokeW,isTotal){

      return React.createElement('g',Object.assign({key:key},clickProps),
        React.createElement('line',{x1:sa.x,y1:sa.y,x2:da.x,y2:da.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:isTotal?.82:.70}),
        React.createElement('line',{x1:sb.x,y1:sb.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:1.0,strokeDasharray:"4,3",opacity:isTotal?.82:.70}),
        React.createElement('line',{x1:da.x,y1:da.y,x2:db.x,y2:db.y,stroke:col,strokeWidth:_nullishCoalesce(strokeW, () => (1.7))}),
        React.createElement('line',{x1:tk.a1.x,y1:tk.a1.y,x2:tk.a2.x,y2:tk.a2.y,stroke:col,strokeWidth:1.8}),
        React.createElement('line',{x1:tk.b1.x,y1:tk.b1.y,x2:tk.b2.x,y2:tk.b2.y,stroke:col,strokeWidth:1.8}),
